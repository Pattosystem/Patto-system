<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PattoStock - 倉庫端末</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{--orange:#EA580C;--orangeL:#FFF7F0;--orangeB:#FED7AA;--blue:#2563EB;--blueL:#EFF6FF;--green:#16A34A;--greenL:#F0FDF4;--red:#DC2626;--redL:#FEF2F2;--ink:#1E293B;--ink2:#475569;--ink3:#94A3B8;--surf:#F8FAFC;--bdr:#E2E8F0}
body{font-family:"M PLUS Rounded 1c",sans-serif;background:var(--surf);color:var(--ink);min-height:100vh;overflow-x:hidden}
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0F172A,#1E3A5F);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.lbox{background:white;border-radius:24px;padding:40px 32px;width:100%;max-width:400px}
.llogo{width:72px;height:72px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:Outfit,sans-serif;font-size:36px;font-weight:800;color:white}
.ltitle{font-family:Outfit,sans-serif;font-size:24px;font-weight:800;color:var(--ink);text-align:center;margin-bottom:4px}
.lsub{font-size:13px;color:var(--ink3);text-align:center;margin-bottom:28px}
.llabel{font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:6px;display:block}
.linput{width:100%;border:2px solid var(--bdr);border-radius:14px;padding:14px 16px;font-size:16px;font-family:inherit;outline:none;margin-bottom:14px;-webkit-appearance:none}
.linput:focus{border-color:var(--orange)}
.lbtn{width:100%;background:var(--orange);color:white;border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:800;font-family:inherit;cursor:pointer}
.lerr{color:var(--red);font-size:13px;margin-top:10px;text-align:center;font-weight:700;display:none}
#clinic-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0F172A,#1E3A5F);display:none;align-items:center;justify-content:center;z-index:900;padding:20px}
.cbox{background:white;border-radius:24px;padding:32px;width:100%;max-width:400px}
.ctitle{font-family:Outfit,sans-serif;font-size:20px;font-weight:800;color:var(--ink);text-align:center;margin-bottom:20px}
.cchoice{width:100%;padding:18px;border-radius:16px;border:2px solid var(--bdr);background:white;font-size:17px;font-weight:800;font-family:inherit;cursor:pointer;color:var(--ink);text-align:left;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.header{background:white;border-bottom:3px solid var(--orange);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.hlogo{display:flex;align-items:center;gap:10px}
.hicon{width:40px;height:40px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Outfit,sans-serif;font-size:20px;font-weight:800;color:white}
.hname{font-family:Outfit,sans-serif;font-size:20px;font-weight:800;color:var(--orange)}
.hsub{font-size:11px;color:var(--ink3);margin-top:1px}
.hright{display:flex;align-items:center;gap:8px}
.sdot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sbadge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green);font-weight:700}
.hbtn{background:var(--orangeL);color:var(--orange);border:2px solid var(--orangeB);border-radius:20px;padding:8px 14px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer}
.main{padding:16px;padding-bottom:90px}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.tab-btn{padding:18px;border-radius:16px;border:2.5px solid var(--bdr);background:white;font-size:18px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;color:var(--ink2)}
.tab-btn.out.active{background:var(--redL);border-color:var(--red);color:var(--red)}
.tab-btn.in.active{background:var(--blueL);border-color:var(--blue);color:var(--blue)}
.catbar{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.catbar::-webkit-scrollbar{display:none}
.cat-btn{background:white;color:var(--ink2);border:2px solid var(--bdr);border-radius:20px;padding:10px 16px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0}
.cat-btn.active{background:var(--orangeL);color:var(--orange);border-color:var(--orange)}
.sec-title{font-size:15px;font-weight:800;color:var(--ink2);margin-bottom:10px;padding-left:4px}
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.pcard{background:white;border:2.5px solid var(--bdr);border-radius:16px;padding:16px;cursor:pointer;position:relative}
.pcard.sel.out{border-color:var(--red);background:var(--redL)}
.pcard.sel.in{border-color:var(--blue);background:var(--blueL)}
.pcard:active{transform:scale(.97)}
.pname{font-size:14px;font-weight:800;color:var(--ink);line-height:1.3;margin-bottom:4px}
.pmeta{font-size:11px;color:var(--ink3);margin-bottom:6px}
.pqty{font-family:Outfit,sans-serif;font-size:26px;font-weight:800;color:var(--ink)}
.pstatus{position:absolute;top:10px;right:10px;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px}
.pstatus.ng{background:var(--redL);color:var(--red)}
.pstatus.warn{background:#FEF9C3;color:#A16207}
.pstatus.ok{background:var(--greenL);color:var(--green)}
.qpanel{background:white;border-radius:20px;padding:20px;margin-bottom:20px;border:2px solid var(--bdr);display:none}
.qpanel.show{display:block}
.qptitle{font-size:13px;font-weight:700;color:var(--ink3);margin-bottom:4px}
.qpname{font-size:18px;font-weight:800;color:var(--ink);margin-bottom:4px}
.qpinfo{font-size:12px;color:var(--ink3);margin-bottom:16px}
.qctrl{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:12px}
.qbtn{width:64px;height:64px;border-radius:50%;border:none;font-size:32px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;user-select:none;-webkit-user-select:none}
.qbtn.minus{background:var(--redL);color:var(--red)}
.qbtn.plus{background:var(--blueL);color:var(--blue)}
.qbtn:active{transform:scale(.93)}
.qdisp{font-family:Outfit,sans-serif;font-size:56px;font-weight:800;color:var(--ink);min-width:80px;text-align:center}
.qunit{font-size:13px;color:var(--ink3);text-align:center;margin-bottom:14px}
.fsel{width:100%;background:var(--surf);border:2px solid var(--bdr);border-radius:12px;padding:12px 14px;font-size:14px;font-family:inherit;color:var(--ink);outline:none;appearance:none;margin-bottom:10px}
.fmemo{width:100%;background:var(--surf);border:2px solid var(--bdr);border-radius:12px;padding:12px 14px;font-size:14px;font-family:inherit;color:var(--ink);outline:none;margin-bottom:14px}
.fsel:focus,.fmemo:focus{border-color:var(--orange)}
.execbtn{width:100%;padding:20px;border-radius:16px;border:none;font-size:20px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
.execbtn.out{background:var(--red);color:white}
.execbtn.in{background:var(--blue);color:white}
.execbtn:active{transform:scale(.98)}
.execbtn:disabled{opacity:.5}
.hitem{background:white;border-radius:12px;padding:14px 16px;border:1.5px solid var(--bdr);display:flex;align-items:center;gap:12px;margin-bottom:8px}
.hicon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hicon.out{background:var(--redL)}
.hicon.in{background:var(--blueL)}
.hbody{flex:1}
.hbname{font-size:14px;font-weight:700;color:var(--ink)}
.hmeta{font-size:11px;color:var(--ink3);margin-top:2px}
.hqty{font-size:18px;font-weight:800}
.hqty.out{color:var(--red)}
.hqty.in{color:var(--blue)}
.toasts{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;min-width:280px;max-width:90vw}
.toast{background:#1E293B;color:white;border-radius:14px;padding:14px 20px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:tin .2s ease}
@keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.loading{text-align:center;padding:40px;color:var(--ink3)}
.lspinner{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.ubtn{padding:12px;border-radius:12px;border:2px solid var(--bdr);background:white;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;color:var(--ink2);transition:all .15s}
.ubtn.active{background:var(--orangeL);border-color:var(--orange);color:var(--orange)}
.pbtn{padding:12px;border-radius:12px;border:2px solid var(--bdr);background:white;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;color:var(--ink2);transition:all .15s}
.pbtn.active{background:var(--redL);border-color:var(--red);color:var(--red)}
.page{display:none}
.page.active{display:block}
.bnav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1.5px solid var(--bdr);display:grid;grid-template-columns:repeat(3,1fr);padding:8px 0 env(safe-area-inset-bottom)}
.nbtn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px;cursor:pointer;border:none;background:none;font-family:inherit;width:100%}
.nbtn .nlbl{font-size:11px;font-weight:700;color:var(--ink3)}
.nbtn.active .nlbl{color:var(--orange)}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lbox">
    <div class="llogo">P</div>
    <div class="ltitle">PattoStock</div>
    <div class="lsub">クリニックコードでログイン</div>
    <label class="llabel">クリニックコード</label>
    <input class="linput" type="text" id="login-code" placeholder="例: baoclinic" autocomplete="off" autocapitalize="off">
    <label class="llabel">パスワード</label>
    <input class="linput" type="password" id="login-pass" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lbtn" onclick="doLogin()">ログイン →</button>
    <div class="lerr" id="login-err">コードまたはパスワードが違います</div>
  </div>
</div>

<div id="clinic-screen">
  <div class="cbox">
    <div class="ctitle">🏥 作業する院を選択</div>
    <div id="clinic-list"></div>
  </div>
</div>

<div class="header" id="main-header" style="display:none">
  <div class="hlogo">
    <div class="hicon">P</div>
    <div>
      <div class="hname">PattoStock</div>
      <div class="hsub" id="header-clinic">—</div>
    </div>
  </div>
  <div class="hright">
    <div class="sbadge"><div class="sdot"></div><span id="sync-status">同期中</span></div>
    <button class="hbtn" onclick="showClinicSelect()">🏥 院を変更</button>
    <button class="hbtn" style="background:var(--redL);color:var(--red);border-color:var(--redB)" onclick="doLogout()">ログアウト</button>
  </div>
</div>

<div class="main" id="main-content" style="display:none">
  <div class="page active" id="page-stock">
    <div class="tabs">
      <button class="tab-btn out active" id="tab-out" onclick="setMode('out')">📤 出庫</button>
      <button class="tab-btn in" id="tab-in" onclick="setMode('in')">📥 入庫</button>
    </div>
    <div class="catbar" id="cat-bar">
      <button class="cat-btn active" id="cat-all" onclick="filterCat('all')">すべて</button>
    </div>
    <div class="sec-title" id="prod-count">商品を選択</div>
    <div class="pgrid" id="prod-grid"><div style="grid-column:1/-1;text-align:center;padding:30px;color:#94A3B8"><div class="lspinner" style="margin:0 auto 12px"></div>読み込み中...</div></div>
    <div class="qpanel" id="qty-panel">
      <div class="qptitle">選択中の商品</div>
      <div class="qpname" id="sel-name">-</div>
      <div class="qpinfo" id="sel-info"></div>
      <div class="qctrl">
        <button class="qbtn minus" onclick="changeQty(-1)">－</button>
        <div class="qdisp" id="qty-disp">1</div>
        <button class="qbtn plus" onclick="changeQty(1)">＋</button>
      </div>
      <div class="qunit" id="qty-unit"></div>

      <!-- 単位切替（箱管理商品のみ表示） -->
      <div id="unit-toggle" style="display:none;margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:8px">入力単位</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <button id="unit-btn-outer" class="ubtn active" onclick="setUnit('outer')">📦 箱単位</button>
          <button id="unit-btn-inner" class="ubtn" onclick="setUnit('inner')">💊 バラ単位</button>
        </div>
      </div>

      <!-- 用途選択（出庫時のみ表示） -->
      <div id="purpose-wrap" style="display:none;margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:8px">出庫用途 *</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <button id="purp-patient" class="pbtn active" onclick="setPurp('patient')">💉 患者使用</button>
          <button id="purp-demo" class="pbtn" onclick="setPurp('demo')">🧪 デモ</button>
          <button id="purp-discard" class="pbtn" onclick="setPurp('discard')">🗑️ 廃棄</button>
          <button id="purp-other" class="pbtn" onclick="setPurp('other')">📝 その他</button>
        </div>
      </div>

      <select class="fsel" id="staff-sel"><option value="">-- 操作者を選択 --</option></select>
      <input class="fmemo" id="memo-inp" type="text" placeholder="メモ（任意）">
      <button class="execbtn out" id="exec-btn" onclick="execStock()">📤 出庫を記録する</button>
    </div>
  </div>
  <div class="page" id="page-history">
    <div class="sec-title">本日の入出庫履歴</div>
    <div id="hist-list"><div class="loading"><div class="lspinner"></div>読み込み中...</div></div>
  </div>
  <div class="page" id="page-check">
    <div class="sec-title">現在の在庫数</div>
    <div id="check-list"></div>
  </div>
</div>

<div class="bnav" id="bottom-nav" style="display:none">
  <button class="nbtn active" id="bnav-stock" onclick="showPage('stock')"><span style="font-size:22px">📦</span><span class="nlbl">入出庫</span></button>
  <button class="nbtn" id="bnav-history" onclick="showPage('history')"><span style="font-size:22px">📋</span><span class="nlbl">履歴</span></button>
  <button class="nbtn" id="bnav-check" onclick="showPage('check')"><span style="font-size:22px">🔍</span><span class="nlbl">在庫確認</span></button>
</div>

<div class="toasts" id="toasts"></div>

<script>
const SURL="https://aeacglgdhskyaachsmdx.supabase.co";
const SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlYWNnbGdkaHNreWFhY2hzbWR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMDczMjAsImV4cCI6MjA5MDU4MzMyMH0.zmcTXwXV33EdpjVxZHfyej-ys4F228FBrZDo5sg9idQ";
const db=supabase.createClient(SURL,SKEY);
let inv=[],selItem=null,mode="out",qty=1,cat="all",corpId=null,corpName="",clinic="",staffList=[],unit="outer",purpose="patient";
const catMap={injection:"💉 注射・点滴",skincare:"🧴 スキンケア",supply:"📋 消耗品",device:"🔧 医療機器"};

async function doLogin(){
  var code=document.getElementById("login-code").value.trim().toLowerCase();
  var pass=document.getElementById("login-pass").value.trim();
  var err=document.getElementById("login-err");
  err.style.display="none";
  if(!code||!pass){err.style.display="block";err.textContent="コードとパスワードを入力してください";return;}
  var btn=document.querySelector(".lbtn");btn.textContent="ログイン中...";btn.disabled=true;
  var{data,error}=await db.from("corporations").select("*").eq("clinic_code",code).eq("password_plain",pass).limit(1);
  btn.textContent="ログイン →";btn.disabled=false;
  if(error||!data||!data.length){err.style.display="block";return;}
  corpId=data[0].id;corpName=data[0].name;
  try{localStorage.setItem("ps_t_id",corpId);localStorage.setItem("ps_t_name",corpName);}catch(e){}
  document.getElementById("login-screen").style.display="none";
  await loadInv();startApp();
}

function doLogout(){
  try{localStorage.removeItem("ps_t_id");localStorage.removeItem("ps_t_name");localStorage.removeItem("ps_t_clinic");}catch(e){}
  location.reload();
}

(async function restore(){
  var sid=localStorage.getItem("ps_t_id");var sname=localStorage.getItem("ps_t_name");
  if(sid&&sname){
    corpId=parseInt(sid);corpName=sname;
    var sc=localStorage.getItem("ps_t_clinic");if(sc)clinic=sc;
    document.getElementById("login-screen").style.display="none";
    await loadInv();startApp();
  }
})();

function startApp(){
  var clinics=[...new Set(inv.map(function(i){return i.clinic;}))].filter(Boolean);
  if(!clinic||!clinics.includes(clinic)){
    if(clinics.length===1){clinic=clinics[0];launchMain();}
    else if(clinics.length>1){showClinicSelect();}
    else{clinic=corpName;launchMain();}
  }else{launchMain();}
}

function showClinicSelect(){
  var clinics=[...new Set(inv.map(function(i){return i.clinic;}))].filter(Boolean);
  var list=document.getElementById("clinic-list");
  list.innerHTML=clinics.map(function(c){
    return "<button class=\"cchoice\" onclick=\"selClinic('"+c.replace(/'/g,"\'")+"')\">"+"<span style=\"font-size:24px\">🏥</span>"+c+"</button>";
  }).join("");
  document.getElementById("clinic-screen").style.display="flex";
}

function selClinic(c){
  clinic=c;
  try{localStorage.setItem("ps_t_clinic",c);}catch(e){}
  document.getElementById("clinic-screen").style.display="none";
  launchMain();
}

function launchMain(){
  document.getElementById("main-header").style.display="flex";
  document.getElementById("main-content").style.display="block";
  document.getElementById("bottom-nav").style.display="grid";
  document.getElementById("header-clinic").textContent=clinic;
  renderProds();renderCheck();renderCats();loadStaff();startRT();
}

async function loadInv(){
  if(!corpId)return;
  var{data,error}=await db.from("inventory").select("*").eq("corporation_id",corpId).order("name");
  if(!error)inv=data||[];
}

function loadStaff(){
  try{staffList=JSON.parse(localStorage.getItem("ps_staff_"+corpId))||[];}catch(e){staffList=[];}
  var sel=document.getElementById("staff-sel");
  sel.innerHTML="<option value=\"\">-- 操作者を選択 --</option>"
    +staffList.map(function(s){return"<option value=\""+s.name+"\">"+s.name+(s.role?" ("+s.role+")":"")+"</option>";}).join("");
}

function fqty(item){
  if(item.units_per_outer&&item.units_per_outer>1){
    var b=Math.ceil(item.quantity/item.units_per_outer);
    return b+(item.outer_unit||"箱")+"("+item.quantity+(item.inner_unit||"個")+")";
  }
  return item.quantity+"個";
}

function renderCats(){
  var bar=document.getElementById("cat-bar");
  var used=[...new Set(inv.filter(function(i){return i.clinic===clinic;}).map(function(i){return i.category;}))].filter(Boolean);
  bar.querySelectorAll(".dcat").forEach(function(b){b.remove();});
  used.forEach(function(c){
    var b=document.createElement("button");b.className="cat-btn dcat";b.id="cat-"+c;
    b.textContent=catMap[c]||("📦 "+c);b.onclick=function(){filterCat(c);};bar.appendChild(b);
  });
}

function filterCat(c){
  cat=c;selItem=null;document.getElementById("qty-panel").classList.remove("show");
  document.querySelectorAll(".cat-btn").forEach(function(b){b.classList.remove("active");});
  var btn=document.getElementById("cat-"+c);if(btn)btn.classList.add("active");
  renderProds();
}

function renderProds(){
  var grid=document.getElementById("prod-grid");
  var f=inv.filter(function(i){return i.clinic===clinic;});
  if(cat!=="all")f=f.filter(function(i){return i.category===cat;});
  document.getElementById("prod-count").textContent="商品を選択（"+f.length+"件）";
  if(!f.length){grid.innerHTML="<div style=\"grid-column:1/-1;text-align:center;padding:30px;color:#94A3B8\">該当する商品がありません</div>";return;}
  grid.innerHTML=f.map(function(item){
    var oq=item.units_per_outer>1?Math.ceil(item.quantity/item.units_per_outer):item.quantity;
    var low=oq<item.min_quantity,warn=!low&&oq<=item.min_quantity;
    var sc=low?"ng":warn?"warn":"ok",sl=low?"要補充":warn?"注意":"正常";
    var isSel=selItem&&selItem.id===item.id;
    var meta=[item.expiry_date?"期限:"+item.expiry_date:"",item.lot_number?"LOT:"+item.lot_number:""].filter(Boolean).join(" / ");
    return"<div class=\"pcard"+(isSel?" sel "+mode:"")+"\" onclick=\"selProd("+item.id+")\">"
      +"<span class=\"pstatus "+sc+"\">"+sl+"</span>"
      +"<div class=\"pname\">"+item.name+"</div>"
      +(meta?"<div class=\"pmeta\">"+meta+"</div>":"")
      +"<div class=\"pqty\">"+fqty(item)+"</div>"
      +"</div>";
  }).join("");
}

function selProd(id){
  selItem=inv.find(function(i){return i.id===id;});if(!selItem)return;
  qty=1;document.getElementById("qty-disp").textContent="1";
  document.getElementById("sel-name").textContent=selItem.name;
  document.getElementById("sel-info").textContent="現在庫: "+fqty(selItem)+(selItem.expiry_date?" / 期限:"+selItem.expiry_date:"");
  var ul=document.getElementById("qty-unit");
  ul.textContent=selItem.units_per_outer>1?"単位:"+(selItem.outer_unit||"箱")+"（1"+(selItem.outer_unit||"箱")+"="+selItem.units_per_outer+(selItem.inner_unit||"個")+"）":"単位:"+(selItem.inner_unit||"個");
  // 単位切替ボタン（箱管理商品のみ表示）
  var unitToggle=document.getElementById("unit-toggle");
  if(selItem.units_per_outer>1){
    unitToggle.style.display="block";
    unit="outer"; // デフォルト箱
    setUnit("outer");
  }else{
    unitToggle.style.display="none";
    unit="inner";
  }
  // 用途選択（出庫時のみ）
  var purposeWrap=document.getElementById("purpose-wrap");
  if(mode==="out"){
    purposeWrap.style.display="block";
    purpose="patient";setPurp("patient");
  }else{
    purposeWrap.style.display="none";
  }
  document.getElementById("qty-panel").classList.add("show");
  document.getElementById("memo-inp").value="";
  renderProds();
  document.getElementById("qty-panel").scrollIntoView({behavior:"smooth",block:"nearest"});
}

function setMode(m){
  mode=m;selItem=null;document.getElementById("qty-panel").classList.remove("show");
  document.getElementById("tab-out").className="tab-btn out"+(m==="out"?" active":"");
  document.getElementById("tab-in").className="tab-btn in"+(m==="in"?" active":"");
  var btn=document.getElementById("exec-btn");
  btn.className="execbtn "+m;btn.innerHTML=m==="out"?"📤 出庫を記録する":"📥 入庫を記録する";
  // 用途選択は出庫時のみ
  var pw=document.getElementById("purpose-wrap");
  if(pw)pw.style.display="none";
  renderProds();
}

function setUnit(u){
  unit=u;
  document.getElementById("unit-btn-outer").className="ubtn"+(u==="outer"?" active":"");
  document.getElementById("unit-btn-inner").className="ubtn"+(u==="inner"?" active":"");
  // ラベル更新
  if(selItem){
    var upo=selItem.units_per_outer>1?selItem.units_per_outer:1;
    var ul=document.getElementById("qty-unit");
    if(u==="outer")ul.textContent="1"+(selItem.outer_unit||"箱")+" = "+upo+(selItem.inner_unit||"個");
    else ul.textContent="バラ（"+( selItem.inner_unit||"個")+"）単位で入力";
  }
}

function setPurp(p){
  purpose=p;
  document.querySelectorAll(".pbtn").forEach(function(b){b.classList.remove("active");});
  var btn=document.getElementById("purp-"+p);if(btn)btn.classList.add("active");
}

function changeQty(d){qty=Math.max(1,qty+d);document.getElementById("qty-disp").textContent=qty;}

async function execStock(){
  if(!selItem){toast("⚠️","商品を選択してください");return;}
  var staff=document.getElementById("staff-sel").value;
  if(!staff){toast("⚠️","操作者を選択してください");return;}
  var btn=document.getElementById("exec-btn");btn.disabled=true;
  var upo=selItem.units_per_outer>1?selItem.units_per_outer:1;
  // 箱単位orバラ単位で計算
  var tq=unit==="outer"?qty*upo:qty;
  var nq=mode==="out"?selItem.quantity-tq:selItem.quantity+tq;
  if(mode==="out"&&nq<0){toast("⚠️","在庫が足りません（現在:"+Math.ceil(selItem.quantity/upo)+(selItem.outer_unit||"箱")+"）");btn.disabled=false;return;}
  var memo=document.getElementById("memo-inp").value;
  var purposeLabels={patient:"患者使用",demo:"デモ",discard:"廃棄",other:"その他"};
  var purposeLabel=mode==="out"?(purposeLabels[purpose]||"患者使用"):"入荷";
  var fullMemo=purposeLabel+(memo?" / "+memo:"");
  var ur=await db.from("inventory").update({quantity:nq,updated_at:new Date().toISOString()}).eq("id",selItem.id);
  if(ur.error){toast("❌","更新に失敗しました");btn.disabled=false;return;}
  await db.from("stock_history").insert({inventory_id:selItem.id,product_name:selItem.name,action_type:mode,quantity:tq,clinic:selItem.clinic,staff_name:staff,memo:fullMemo,corporation_id:corpId});
  var ud=unit==="outer"&&upo>1?qty+(selItem.outer_unit||"箱"):tq+(selItem.inner_unit||"個");
  toast(mode==="out"?"📤":"📥",selItem.name+" × "+ud+(mode==="out"?" 出庫":" 入庫")+"しました");
  selItem=null;qty=1;document.getElementById("qty-panel").classList.remove("show");btn.disabled=false;
  await loadInv();renderProds();renderCheck();renderCats();loadHist();
}

async function loadHist(){
  var today=new Date().toISOString().split("T")[0];
  var{data}=await db.from("stock_history").select("*").eq("clinic",clinic).gte("created_at",today+"T00:00:00").order("created_at",{ascending:false}).limit(50);
  var el=document.getElementById("hist-list");
  if(!data||!data.length){el.innerHTML="<div style=\"text-align:center;padding:30px;color:#94A3B8\">本日の履歴はありません</div>";return;}
  el.innerHTML=data.map(function(h){
    var t=new Date(h.created_at),ts=t.getHours()+":"+String(t.getMinutes()).padStart(2,"0");
    return"<div class=\"hitem\"><div class=\"hicon "+h.action_type+"\">"+(h.action_type==="out"?"📤":"📥")+"</div>"
      +"<div class=\"hbody\"><div class=\"hbname\">"+h.product_name+"</div>"
      +"<div class=\"hmeta\">"+ts+" ｜ "+(h.staff_name||"")+(h.memo?" ｜ "+h.memo:"")+"</div></div>"
      +"<div class=\"hqty "+h.action_type+"\">"+(h.action_type==="out"?"－":"＋")+h.quantity+"</div></div>";
  }).join("");
}

function renderCheck(){
  var el=document.getElementById("check-list");
  var f=inv.filter(function(i){return i.clinic===clinic;});
  if(!f.length){el.innerHTML="<div style=\"text-align:center;padding:30px;color:#94A3B8\">在庫データがありません</div>";return;}
  el.innerHTML=f.map(function(item){
    var oq=item.units_per_outer>1?Math.ceil(item.quantity/item.units_per_outer):item.quantity;
    var low=oq<item.min_quantity,warn=!low&&oq<=item.min_quantity;
    var col=low?"#DC2626":warn?"#D97706":"#16A34A",bg=low?"#FEF2F2":warn?"#FFFBEB":"#F0FDF4";
    return"<div style=\"background:white;border-radius:12px;padding:14px 16px;margin-bottom:8px;border:1.5px solid #E2E8F0;display:flex;align-items:center;gap:12px\">"
      +"<div style=\"flex:1\"><div style=\"font-size:14px;font-weight:700;color:#1E293B\">"+item.name+"</div>"
      +"<div style=\"font-size:11px;color:#94A3B8;margin-top:2px\">最小:"+item.min_quantity+(item.units_per_outer>1?(item.outer_unit||"箱"):"個")+(item.expiry_date?" ｜ 期限:"+item.expiry_date:"")+"</div></div>"
      +"<div style=\"text-align:right\"><div style=\"font-family:Outfit,sans-serif;font-size:24px;font-weight:800;color:"+col+"\">"+fqty(item)+"</div>"
      +"<div style=\"font-size:10px;background:"+bg+";color:"+col+";padding:2px 8px;border-radius:8px;font-weight:700\">"+(low?"要補充":warn?"注意":"正常")+"</div></div></div>";
  }).join("");
}

function showPage(name){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  document.querySelectorAll(".nbtn").forEach(function(b){b.classList.remove("active");});
  document.getElementById("page-"+name).classList.add("active");
  document.getElementById("bnav-"+name).classList.add("active");
  if(name==="history")loadHist();
  if(name==="check")renderCheck();
}

function startRT(){
  db.channel("tablet-rt")
    .on("postgres_changes",{event:"*",schema:"public",table:"inventory"},async function(){await loadInv();renderProds();renderCheck();renderCats();})
    .subscribe(function(s){document.getElementById("sync-status").textContent=s==="SUBSCRIBED"?"同期中":"接続中...";});
}

function toast(icon,msg){
  var el=document.createElement("div");el.className="toast";
  el.innerHTML="<span>"+icon+"</span><span>"+msg+"</span>";
  document.getElementById("toasts").appendChild(el);
  setTimeout(function(){el.remove();},3000);
}

var lte=0;
document.addEventListener("touchend",function(e){var n=Date.now();if(n-lte<=300)e.preventDefault();lte=n;},{passive:false});
document.addEventListener("touchstart",function(e){if(e.touches.length>1)e.preventDefault();},{passive:false});
</script>
</body>
</html>
