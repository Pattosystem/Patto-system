<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PattoStock - 倉庫端末</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{
  --orange:#EA580C;--orangeL:#FFF7F0;--orangeB:#FED7AA;
  --blue:#2563EB;--blueL:#EFF6FF;--blueB:#BFDBFE;
  --green:#16A34A;--greenL:#F0FDF4;--greenB:#BBF7D0;
  --red:#DC2626;--redL:#FEF2F2;--redB:#FECACA;
  --ink:#1E293B;--ink2:#475569;--ink3:#94A3B8;
  --surf:#F8FAFC;--bdr:#E2E8F0;
}
body{font-family:'M PLUS Rounded 1c',sans-serif;background:var(--surf);color:var(--ink);min-height:100vh;overflow-x:hidden}

/* ヘッダー */
.header{background:white;border-bottom:3px solid var(--orange);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.header-logo{display:flex;align-items:center;gap:10px}
.header-logo-icon{width:40px;height:40px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center}
.header-logo-name{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:var(--orange)}
.header-logo-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.header-right{display:flex;align-items:center;gap:10px}
.clinic-badge{background:var(--orangeL);color:var(--orange);border:1.5px solid var(--orangeB);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700}
.clinic-select{background:var(--orangeL);color:var(--orange);border:2px solid var(--orangeB);border-radius:20px;padding:8px 16px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none}
.cat-btn{background:white;color:var(--ink2);border:2px solid var(--bdr);border-radius:20px;padding:10px 18px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.cat-btn.active{background:var(--orangeL);color:var(--orange);border-color:var(--orange)}
.clinic-btns{display:flex;gap:6px}
.clinic-btn{background:white;color:var(--ink2);border:2px solid var(--bdr);border-radius:20px;padding:8px 14px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.clinic-btn.active{background:var(--orangeL);color:var(--orange);border-color:var(--orange)}
.sync-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green);font-weight:700}
.sync-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* メインコンテンツ */
.main{padding:20px}

/* タブ切り替え */
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.tab-btn{padding:18px;border-radius:16px;border:2.5px solid var(--bdr);background:white;font-size:18px;font-weight:800;font-family:inherit;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:10px}
.tab-btn.out.active{background:var(--redL);border-color:var(--red);color:var(--red)}
.tab-btn.in.active{background:var(--blueL);border-color:var(--blue);color:var(--blue)}
.tab-btn:not(.active){color:var(--ink2)}

/* 商品選択 */
.section-title{font-size:15px;font-weight:800;color:var(--ink2);margin-bottom:10px;padding-left:4px}
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.product-card{background:white;border:2.5px solid var(--bdr);border-radius:16px;padding:16px;cursor:pointer;transition:all .15s;position:relative}
.product-card.selected.out{border-color:var(--red);background:var(--redL)}
.product-card.selected.in{border-color:var(--blue);background:var(--blueL)}
.product-card:active{transform:scale(.97)}
.product-name{font-size:14px;font-weight:800;color:var(--ink);line-height:1.3;margin-bottom:6px}
.product-clinic{font-size:11px;color:var(--ink3);margin-bottom:8px}
.product-qty{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:var(--ink)}
.product-qty-label{font-size:11px;color:var(--ink3)}
.product-status{position:absolute;top:10px;right:10px;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px}
.product-status.ng{background:var(--redL);color:var(--red)}
.product-status.warn{background:#FEF9C3;color:#A16207}
.product-status.ok{background:var(--greenL);color:var(--green)}

/* 数量入力 */
.qty-panel{background:white;border-radius:20px;padding:20px;margin-bottom:20px;border:2px solid var(--bdr);display:none}
.qty-panel.show{display:block}
.qty-panel-title{font-size:14px;font-weight:800;color:var(--ink2);margin-bottom:4px}
.qty-panel-product{font-size:18px;font-weight:800;color:var(--ink);margin-bottom:16px}

/* 数量コントロール */
.qty-control{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px}
.qty-btn{width:64px;height:64px;border-radius:50%;border:none;font-size:32px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.qty-btn.minus{background:var(--redL);color:var(--red)}
.qty-btn.plus{background:var(--blueL);color:var(--blue)}
.qty-btn:active{transform:scale(.93)}
.qty-display{font-family:'Outfit',sans-serif;font-size:56px;font-weight:800;color:var(--ink);min-width:80px;text-align:center}

/* スタッフ入力 */
.staff-row{display:flex;gap:10px;margin-bottom:14px}
.staff-select{flex:1;background:var(--surf);border:2px solid var(--bdr);border-radius:12px;padding:12px 14px;font-size:14px;font-family:inherit;color:var(--ink);outline:none;appearance:none}
.memo-input{width:100%;background:var(--surf);border:2px solid var(--bdr);border-radius:12px;padding:12px 14px;font-size:14px;font-family:inherit;color:var(--ink);outline:none;margin-bottom:14px}
.memo-input:focus,.staff-select:focus{border-color:var(--orange)}

/* 実行ボタン */
.exec-btn{width:100%;padding:20px;border-radius:16px;border:none;font-size:20px;font-weight:800;font-family:inherit;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:10px}
.exec-btn.out{background:var(--red);color:white}
.exec-btn.in{background:var(--blue);color:white}
.exec-btn:active{transform:scale(.98)}
.exec-btn:disabled{opacity:.5;cursor:not-allowed}

/* 履歴 */
.history-list{display:flex;flex-direction:column;gap:8px}
.history-item{background:white;border-radius:12px;padding:14px 16px;border:1.5px solid var(--bdr);display:flex;align-items:center;gap:12px}
.history-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.history-icon.out{background:var(--redL)}
.history-icon.in{background:var(--blueL)}
.history-body{flex:1}
.history-name{font-size:14px;font-weight:700;color:var(--ink)}
.history-meta{font-size:11px;color:var(--ink3);margin-top:2px}
.history-qty{font-size:18px;font-weight:800}
.history-qty.out{color:var(--red)}
.history-qty.in{color:var(--blue)}

/* トースト */
.toasts{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;min-width:300px}
.toast{background:#1E293B;color:white;border-radius:14px;padding:14px 20px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:tin .2s ease}
@keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ローディング */
.loading{text-align:center;padding:40px;color:var(--ink3);font-size:14px}
.loading-spinner{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ページ切り替え */
.page{display:none}
.page.active{display:block}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1.5px solid var(--bdr);display:grid;grid-template-columns:repeat(3,1fr);padding:8px 0 env(safe-area-inset-bottom)}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px;cursor:pointer;transition:all .13s;border:none;background:none;font-family:inherit}
.bnav-icon{font-size:22px}
.bnav-label{font-size:11px;font-weight:700;color:var(--ink3)}
.bnav-btn.active .bnav-label{color:var(--orange)}
.main{padding-bottom:80px}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div class="header-logo">
    <div class="header-logo-icon">
      <svg width="24" height="24" viewBox="0 0 44 44"><text x="22" y="34" text-anchor="middle" font-size="36" font-weight="800" fill="white" font-family="sans-serif">P</text><circle cx="36" cy="10" r="8" fill="white" opacity=".3"/><polyline points="32,10 35,13 40,7" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div>
      <div class="header-logo-name">PattoStock</div>
      <div class="header-logo-sub" id="header-clinic-name">倉庫端末</div>
    </div>
  </div>
  <div class="header-right">
    <div class="sync-indicator">
      <div class="sync-dot"></div>
      <span id="sync-status">同期中</span>
    </div>
    <button class="clinic-btn" onclick="openClinicSetup()" style="background:var(--orangeL);color:var(--orange);border-color:var(--orange)">🏥 院を変更</button>
  </div>
</div>

<!-- 院選択セットアップ画面 -->
<div id="setup-screen" style="position:fixed;top:0;left:0;right:0;bottom:0;background:white;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px">
  <div style="width:64px;height:64px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:20px">
    <svg width="36" height="36" viewBox="0 0 44 44"><text x="22" y="34" text-anchor="middle" font-size="36" font-weight="800" fill="white" font-family="sans-serif">P</text></svg>
  </div>
  <div style="font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:var(--orange);margin-bottom:8px">PattoStock</div>
  <div style="font-size:15px;color:var(--ink3);margin-bottom:40px">この端末で使用するクリニックを選択してください</div>
  <div id="setup-clinic-list" style="width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px"></div>
</div>

<!-- メイン -->
<div class="main">

  <!-- 入出庫ページ -->
  <div class="page active" id="page-stock">

    <!-- タブ -->
    <div class="tabs">
      <button class="tab-btn out active" id="tab-out" onclick="setMode('out')">
        📤 出庫
      </button>
      <button class="tab-btn in" id="tab-in" onclick="setMode('in')">
        📥 入庫
      </button>
    </div>

    <!-- カテゴリーフィルター -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
      <button class="cat-btn active" id="cat-all" onclick="filterCat('all')">すべて</button>
      <button class="cat-btn" id="cat-injection" onclick="filterCat('injection')">💉 注射・点滴</button>
      <button class="cat-btn" id="cat-skincare" onclick="filterCat('skincare')">🧴 スキンケア</button>
      <button class="cat-btn" id="cat-supply" onclick="filterCat('supply')">📋 消耗品</button>
    </div>

    <!-- 商品一覧 -->
    <div class="section-title" id="product-count">商品を選択</div>
    <div class="product-grid" id="product-grid">
      <div style="grid-column:1/-1;text-align:center;padding:30px;color:#94A3B8">
        <div class="loading-spinner" style="margin:0 auto 12px"></div>
        読み込み中...
      </div>
    </div>

    <!-- 数量入力パネル -->
    <div class="qty-panel" id="qty-panel">
      <div class="qty-panel-title">選択中の商品</div>
      <div class="qty-panel-product" id="selected-name">-</div>

      <div class="qty-control">
        <button class="qty-btn minus" onclick="changeQty(-1)">－</button>
        <div class="qty-display" id="qty-display">1</div>
        <button class="qty-btn plus" onclick="changeQty(1)">＋</button>
      </div>

      <div class="staff-row">
        <select class="staff-select" id="staff-select">
          <option value="田中 院長">田中 院長</option>
          <option value="山田 医師">山田 医師</option>
          <option value="鈴木 看護師">鈴木 看護師</option>
          <option value="佐藤 看護師">佐藤 看護師</option>
          <option value="高橋 受付">高橋 受付</option>
        </select>
      </div>
      <input class="memo-input" id="memo-input" type="text" placeholder="メモ（任意）例：施術使用、補充など">

      <button class="exec-btn out" id="exec-btn" onclick="execStock()">
        📤 出庫を記録する
      </button>
    </div>
  </div>

  <!-- 履歴ページ -->
  <div class="page" id="page-history">
    <div class="section-title">本日の入出庫履歴</div>
    <div class="history-list" id="history-list">
      <div class="loading"><div class="loading-spinner"></div>読み込み中...</div>
    </div>
  </div>

  <!-- 在庫確認ページ -->
  <div class="page" id="page-check">
    <div class="section-title">現在の在庫数</div>
    <div id="check-list"></div>
  </div>

</div>

<!-- ボトムナビ -->
<div class="bottom-nav">
  <button class="bnav-btn active" id="bnav-stock" onclick="showPage('stock')">
    <span class="bnav-icon">📦</span>
    <span class="bnav-label">入出庫</span>
  </button>
  <button class="bnav-btn" id="bnav-history" onclick="showPage('history')">
    <span class="bnav-icon">📋</span>
    <span class="bnav-label">履歴</span>
  </button>
  <button class="bnav-btn" id="bnav-check" onclick="showPage('check')">
    <span class="bnav-icon">🔍</span>
    <span class="bnav-label">在庫確認</span>
  </button>
</div>

<div class="toasts" id="toasts"></div>

<script>
// ══════════════════════════════
// Supabase接続
// ══════════════════════════════
const SUPABASE_URL = 'https://aeacglgdhskyaachsmdx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sZDmywDiTTWd5cEIXgMY7w_ZxTYKN14';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let inventory = [];
let selectedItem = null;
let currentMode = 'out';
let currentQty = 1;
let currentCat = 'all';
// 前回選択した院をlocalStorageから復元
let CLINIC = localStorage.getItem('pattostock_clinic') || '';

// ══════════════════════════════
// クリニック切替
// ══════════════════════════════
function changeClinic(clinic) {
  CLINIC = clinic;
  selectedItem = null;
  document.getElementById('qty-panel').classList.remove('show');
  // ボタンのactive状態を更新
  document.querySelectorAll('.clinic-btn').forEach(function(btn){
    btn.classList.toggle('active', btn.id === 'cbtn-' + clinic);
  });
  renderProducts();
  renderCheckList();
  toast('🏥', clinic + ' に切り替えました');
}

// ══════════════════════════════
// 初期化
// ══════════════════════════════
async function init() {
  // 保存済みの院名をヘッダーに表示
  if(CLINIC) {
    document.getElementById('header-clinic-name').textContent = CLINIC;
  }
  await loadInventory();
  loadHistory();

  // リアルタイム同期
  db.channel('tablet-sync')
    .on('postgres_changes', {event:'*', schema:'public', table:'inventory'},
      function(){ loadInventory(); })
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'stock_history'},
      function(){ loadHistory(); })
    .subscribe(function(status){
      document.getElementById('sync-status').textContent = status === 'SUBSCRIBED' ? '同期中' : '接続中...';
    });
}

// ══════════════════════════════
// 在庫読み込み
// ══════════════════════════════
async function loadInventory() {
  const { data, error } = await db.from('inventory').select('*').order('name');
  if(error){ toast('⚠️','データ読み込みエラー'); return; }
  inventory = data || [];

  // クリニック一覧をDBから動的に生成
  var clinics = [...new Set(inventory.map(function(i){ return i.clinic; }))].filter(Boolean);

  // セットアップ画面のボタンを更新
  var setupList = document.getElementById('setup-clinic-list');
  if(setupList){
    setupList.innerHTML = clinics.map(function(c){
      return '<button onclick="selectClinicAndStart(\'' + c + '\')" style="width:100%;padding:20px;border-radius:16px;border:2px solid var(--bdr);background:white;font-size:18px;font-weight:800;font-family:inherit;cursor:pointer;color:var(--ink);transition:all .15s;text-align:left;display:flex;align-items:center;gap:12px">'
        + '<span style="font-size:24px">🏥</span>' + c + '</button>';
    }).join('');
  }

  // CLINICが未設定なら初回セットアップ画面を表示
  if(!CLINIC){
    document.getElementById('setup-screen').style.display = 'flex';
    return;
  }

  // CLINICが存在しない院になっていたら最初の院に変更
  if(!clinics.includes(CLINIC)) CLINIC = clinics[0];

  renderProducts();
  renderCheckList();
}

// 院を選択してスタート
function selectClinicAndStart(clinic) {
  CLINIC = clinic;
  localStorage.setItem('pattostock_clinic', clinic);
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('header-clinic-name').textContent = clinic;
  renderProducts();
  renderCheckList();
  toast('🏥', clinic + ' で開始します');
}

// 院変更ボタン
function openClinicSetup() {
  document.getElementById('setup-screen').style.display = 'flex';
}

// ══════════════════════════════
// カテゴリーフィルター
// ══════════════════════════════
var catLabels = {all:'すべて', injection:'💉 注射・点滴', skincare:'🧴 スキンケア', supply:'📋 消耗品'};

function filterCat(cat) {
  currentCat = cat;
  selectedItem = null;
  document.getElementById('qty-panel').classList.remove('show');
  document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('active'); });
  var btn = document.getElementById('cat-' + cat);
  if(btn) btn.classList.add('active');
  renderProducts();
}

// ══════════════════════════════
// 商品グリッド表示
// ══════════════════════════════
function renderProducts() {
  var grid = document.getElementById('product-grid');
  var filtered = inventory.filter(function(i){ return i.clinic === CLINIC; });
  if(currentCat !== 'all') filtered = filtered.filter(function(i){ return i.category === currentCat; });

  // 件数表示
  var countEl = document.getElementById('product-count');
  if(countEl) countEl.textContent = '商品を選択（' + filtered.length + '件）';

  if(filtered.length === 0){
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:#94A3B8">該当する商品がありません</div>';
    return;
  }
  grid.innerHTML = filtered.map(function(item) {
    var isLow = item.quantity <= item.min_quantity;
    var isWarn = !isLow && item.quantity <= item.min_quantity * 1.5;
    var statusClass = isLow ? 'ng' : isWarn ? 'warn' : 'ok';
    var statusLabel = isLow ? '要補充' : isWarn ? '注意' : '正常';
    var isSelected = selectedItem && selectedItem.id === item.id;
    return '<div class="product-card' + (isSelected ? ' selected ' + currentMode : '') + '" onclick="selectProduct(' + item.id + ')">'
      + '<span class="product-status ' + statusClass + '">' + statusLabel + '</span>'
      + '<div class="product-name">' + item.name + '</div>'
      + '<div class="product-clinic">🏥 ' + item.clinic + '</div>'
      + '<div class="product-qty">' + item.quantity + '<span class="product-qty-label"> 個</span></div>'
      + '</div>';
  }).join('');
}

// ══════════════════════════════
// 商品選択
// ══════════════════════════════
function selectProduct(id) {
  selectedItem = inventory.find(function(i){ return i.id === id; });
  if(!selectedItem) return;
  currentQty = 1;
  document.getElementById('qty-display').textContent = '1';
  document.getElementById('selected-name').textContent = selectedItem.name;
  document.getElementById('qty-panel').classList.add('show');
  document.getElementById('memo-input').value = '';
  renderProducts();
  document.getElementById('qty-panel').scrollIntoView({behavior:'smooth', block:'nearest'});
}

// ══════════════════════════════
// モード切替（入庫/出庫）
// ══════════════════════════════
function setMode(mode) {
  currentMode = mode;
  selectedItem = null;
  document.getElementById('qty-panel').classList.remove('show');
  document.getElementById('tab-out').className = 'tab-btn out' + (mode==='out'?' active':'');
  document.getElementById('tab-in').className = 'tab-btn in' + (mode==='in'?' active':'');
  var btn = document.getElementById('exec-btn');
  btn.className = 'exec-btn ' + mode;
  btn.textContent = mode === 'out' ? '📤 出庫を記録する' : '📥 入庫を記録する';
  renderProducts();
}

// ══════════════════════════════
// 数量変更
// ══════════════════════════════
function changeQty(delta) {
  currentQty = Math.max(1, currentQty + delta);
  document.getElementById('qty-display').textContent = currentQty;
}

// ══════════════════════════════
// 入出庫実行
// ══════════════════════════════
async function execStock() {
  if(!selectedItem){ toast('⚠️','商品を選択してください'); return; }
  var btn = document.getElementById('exec-btn');
  btn.disabled = true;

  var newQty = currentMode === 'out'
    ? selectedItem.quantity - currentQty
    : selectedItem.quantity + currentQty;

  if(currentMode === 'out' && newQty < 0){
    toast('⚠️','在庫数が足りません（現在：' + selectedItem.quantity + '個）');
    btn.disabled = false;
    return;
  }

  var staff = document.getElementById('staff-select').value;
  var memo = document.getElementById('memo-input').value;

  // 在庫数更新
  var updateRes = await db.from('inventory')
    .update({ quantity: newQty, updated_at: new Date().toISOString() })
    .eq('id', selectedItem.id);

  if(updateRes.error){
    toast('❌','更新に失敗しました');
    btn.disabled = false;
    return;
  }

  // 履歴記録
  await db.from('stock_history').insert({
    inventory_id: selectedItem.id,
    product_name: selectedItem.name,
    action_type: currentMode,
    quantity: currentQty,
    clinic: selectedItem.clinic,
    staff_name: staff,
    memo: memo
  });

  toast(currentMode==='out'?'📤':'📥',
    selectedItem.name + ' を ' + currentQty + '個 ' + (currentMode==='out'?'出庫':'入庫') + 'しました');

  selectedItem = null;
  currentQty = 1;
  document.getElementById('qty-panel').classList.remove('show');
  btn.disabled = false;
  await loadInventory();
  loadHistory();
}

// ══════════════════════════════
// 履歴読み込み
// ══════════════════════════════
async function loadHistory() {
  var today = new Date().toISOString().split('T')[0];
  var { data, error } = await db.from('stock_history')
    .select('*')
    .gte('created_at', today + 'T00:00:00')
    .order('created_at', {ascending:false})
    .limit(30);

  var el = document.getElementById('history-list');
  if(error || !data || data.length === 0){
    el.innerHTML = '<div style="text-align:center;padding:30px;color:#94A3B8">本日の履歴はありません</div>';
    return;
  }
  el.innerHTML = data.map(function(h) {
    var t = new Date(h.created_at);
    var timeStr = t.getHours() + ':' + String(t.getMinutes()).padStart(2,'0');
    return '<div class="history-item">'
      + '<div class="history-icon ' + h.action_type + '">' + (h.action_type==='out'?'📤':'📥') + '</div>'
      + '<div class="history-body">'
      + '<div class="history-name">' + h.product_name + '</div>'
      + '<div class="history-meta">' + timeStr + ' ｜ ' + (h.staff_name||'') + (h.memo?' ｜ '+h.memo:'') + '</div>'
      + '</div>'
      + '<div class="history-qty ' + h.action_type + '">' + (h.action_type==='out'?'－':'＋') + h.quantity + '</div>'
      + '</div>';
  }).join('');
}

// ══════════════════════════════
// 在庫確認リスト
// ══════════════════════════════
function renderCheckList() {
  var el = document.getElementById('check-list');
  var filtered = inventory.filter(function(i){ return i.clinic === CLINIC; });
  el.innerHTML = filtered.map(function(item) {
    var isLow = item.quantity <= item.min_quantity;
    var isWarn = !isLow && item.quantity <= item.min_quantity * 1.5;
    var color = isLow ? '#DC2626' : isWarn ? '#D97706' : '#16A34A';
    var bg = isLow ? '#FEF2F2' : isWarn ? '#FFFBEB' : '#F0FDF4';
    return '<div style="background:white;border-radius:12px;padding:14px 16px;margin-bottom:8px;border:1.5px solid #E2E8F0;display:flex;align-items:center;gap:12px">'
      + '<div style="flex:1">'
      + '<div style="font-size:14px;font-weight:700;color:#1E293B">' + item.name + '</div>'
      + '<div style="font-size:11px;color:#94A3B8;margin-top:2px">🏥 ' + item.clinic + ' ｜ 最小：' + item.min_quantity + '個</div>'
      + '</div>'
      + '<div style="text-align:right">'
      + '<div style="font-family:Outfit,sans-serif;font-size:28px;font-weight:800;color:' + color + '">' + item.quantity + '</div>'
      + '<div style="font-size:10px;background:' + bg + ';color:' + color + ';padding:2px 8px;border-radius:8px;font-weight:700">'
      + (isLow?'要補充':isWarn?'注意':'正常') + '</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

// ══════════════════════════════
// ページ切替
// ══════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.bnav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('bnav-' + name).classList.add('active');
  if(name === 'history') loadHistory();
}

// ══════════════════════════════
// トースト
// ══════════════════════════════
function toast(icon, msg) {
  var el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = '<span>' + icon + '</span><span>' + msg + '</span>';
  document.getElementById('toasts').appendChild(el);
  setTimeout(function(){ el.remove(); }, 3000);
}

init();
</script>
