<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PattoStock 管理者ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#EA580C;--orangeL:#FFF7F0;
  --blue:#2563EB;--blueL:#EFF6FF;
  --green:#16A34A;--greenL:#F0FDF4;
  --red:#DC2626;--redL:#FEF2F2;
  --amber:#D97706;--amberL:#FFFBEB;
  --ink:#1E293B;--ink2:#475569;--ink3:#94A3B8;
  --surf:#F8FAFC;--bdr:#E2E8F0;--sh:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:'M PLUS Rounded 1c',sans-serif;background:#0F172A;color:var(--ink);min-height:100vh}

/* ログイン画面 */
#login-screen{position:fixed;inset:0;background:#0F172A;display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:white;border-radius:20px;padding:40px;width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-logo{width:64px;height:64px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:'Outfit',sans-serif;font-size:32px;font-weight:800;color:white}
.login-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;color:var(--ink);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--ink3);margin-bottom:28px}
.login-input{width:100%;border:2px solid var(--bdr);border-radius:12px;padding:12px 16px;font-size:15px;font-family:inherit;outline:none;margin-bottom:12px;transition:border-color .15s}
.login-input:focus{border-color:var(--orange)}
.login-btn{width:100%;background:var(--orange);color:white;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;transition:all .15s}
.login-btn:hover{background:#C2410C}
.login-err{color:var(--red);font-size:13px;margin-top:8px;display:none}

/* ヘッダー */
.header{background:#1E293B;border-bottom:3px solid var(--orange);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-logo{display:flex;align-items:center;gap:10px}
.header-logo-icon{width:36px;height:36px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:white}
.header-logo-name{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:white}
.header-logo-badge{background:var(--orange);color:white;font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;margin-left:6px}
.header-right{display:flex;align-items:center;gap:12px}
.sync-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-text{font-size:12px;color:#94A3B8;font-weight:700}
.last-updated{font-size:11px;color:#64748B}
.logout-btn{background:rgba(255,255,255,.1);color:white;border:1.5px solid rgba(255,255,255,.2);border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}

/* メイン */
.main{padding:24px;max-width:1400px;margin:0 auto}

/* KPIカード */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:white;border-radius:16px;padding:20px 24px;box-shadow:var(--sh);border-left:4px solid var(--blue)}
.kpi-card.red{border-left-color:var(--red)}
.kpi-card.green{border-left-color:var(--green)}
.kpi-card.amber{border-left-color:var(--amber)}
.kpi-label{font-size:12px;font-weight:700;color:var(--ink3);margin-bottom:8px}
.kpi-value{font-family:'Outfit',sans-serif;font-size:36px;font-weight:800;color:var(--ink);line-height:1}
.kpi-sub{font-size:12px;color:var(--ink3);margin-top:6px}

/* セクション */
.section-title{font-size:15px;font-weight:800;color:white;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-badge{background:rgba(255,255,255,.1);color:#94A3B8;font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px}

/* テーブル */
.card{background:white;border-radius:16px;box-shadow:var(--sh);overflow:hidden;margin-bottom:20px}
.card-header{padding:14px 20px;border-bottom:2px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:var(--surf)}
.card-title{font-size:14px;font-weight:800;color:var(--ink)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:9px 14px;background:var(--surf);color:var(--ink3);font-size:11px;font-weight:700;white-space:nowrap}
td{padding:10px 14px;border-bottom:1.5px solid var(--bdr);color:var(--ink)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFCFF}
.chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700}
.chip-red{background:var(--redL);color:var(--red)}
.chip-green{background:var(--greenL);color:var(--green)}
.chip-amber{background:var(--amberL);color:var(--amber)}
.chip-blue{background:var(--blueL);color:var(--blue)}

/* グラフエリア */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.bar-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.bar-row:last-child{border-bottom:none}
.bar-label{font-size:12px;font-weight:700;color:var(--ink);width:160px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-wrap{flex:1;height:20px;background:var(--surf);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 8px;transition:width .5s}
.bar-val{font-size:11px;font-weight:700;color:#fff;white-space:nowrap}

/* ローディング */
.loading{text-align:center;padding:40px;color:var(--ink3)}
.spinner{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* フィルター */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{background:rgba(255,255,255,.08);color:#94A3B8;border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}
.filter-btn.active{background:var(--orange);color:white;border-color:var(--orange)}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">P</div>
    <div class="login-title">管理者ダッシュボード</div>
    <div class="login-sub">PattoStock 提供者専用画面</div>
    <input class="login-input" type="password" id="login-pass" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="login-err">パスワードが違います</div>
  </div>
</div>

<!-- メイン画面 -->
<div id="main-screen" style="display:none">

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-logo">
      <div class="header-logo-icon">P</div>
      <div class="header-logo-name">PattoStock</div>
      <span class="header-logo-badge">管理者</span>
    </div>
    <div class="header-right">
      <div class="sync-dot"></div>
      <span class="sync-text">リアルタイム監視中</span>
      <span class="last-updated" id="last-updated">--:--更新</span>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <div class="main">

    <!-- KPI -->
    <div class="kpi-grid" id="kpi-grid">
      <div class="kpi-card red">
        <div class="kpi-label">⚠️ 要補充アイテム（全体）</div>
        <div class="kpi-value" id="kpi-low">-</div>
        <div class="kpi-sub">在庫切れ間近の商品数</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">📦 総在庫品目数</div>
        <div class="kpi-value" id="kpi-total">-</div>
        <div class="kpi-sub">全クリニック合計</div>
      </div>
      <div class="kpi-card amber">
        <div class="kpi-label">🏥 登録クリニック数</div>
        <div class="kpi-value" id="kpi-clinics">-</div>
        <div class="kpi-sub">利用中のクリニック</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">📋 本日の入出庫件数</div>
        <div class="kpi-value" id="kpi-today">-</div>
        <div class="kpi-sub">タブレット・PC含む</div>
      </div>
    </div>

    <!-- 在庫不足アラート -->
    <div class="section-title">⚠️ 在庫不足アラート <span class="section-badge" id="alert-count">0件</span></div>
    <div class="card" style="margin-bottom:20px">
      <div id="alert-list"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
    </div>

    <!-- 商品別消費ランキング & クリニック別在庫 -->
    <div class="grid-2">
      <!-- 消費ランキング -->
      <div>
        <div class="section-title">📊 商品別 消費ランキング（出庫数）</div>
        <div class="card">
          <div class="card-header"><div class="card-title">よく使われている商品TOP10</div></div>
          <div style="padding:16px" id="consumption-chart">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- クリニック別在庫状況 -->
      <div>
        <div class="section-title">🏥 クリニック別 在庫状況</div>
        <div class="card">
          <div class="card-header"><div class="card-title">クリニックごとの在庫サマリー</div></div>
          <div style="padding:0" id="clinic-summary">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 全在庫一覧 -->
    <div class="section-title">📦 全在庫一覧
      <span class="section-badge" id="inv-count">0件</span>
    </div>
    <div class="filter-bar" id="clinic-filters"></div>
    <div class="card" style="margin-bottom:20px">
      <div style="overflow-x:auto" id="inv-table">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- 入出庫履歴 -->
    <div class="section-title">🔄 直近の入出庫履歴</div>
    <div class="card">
      <div id="history-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://aeacglgdhskyaachsmdx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sZDmywDiTTWd5cEIXgMY7w_ZxTYKN14';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// パスワード（実運用では変更してください）
const ADMIN_PASSWORD = 'patto2026';

let allInventory = [];
let allHistory = [];
let currentClinicFilter = 'all';

// ══════════════════════════════
// ログイン
// ══════════════════════════════
function doLogin() {
  var pass = document.getElementById('login-pass').value;
  if(pass === ADMIN_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    sessionStorage.setItem('admin_auth', '1');
    loadAll();
    startRealtime();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('login-pass').value = '';
  }
}

function doLogout() {
  sessionStorage.removeItem('admin_auth');
  location.reload();
}

// セッション復元
if(sessionStorage.getItem('admin_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  loadAll();
  startRealtime();
}

// ══════════════════════════════
// データ読み込み
// ══════════════════════════════
async function loadAll() {
  await Promise.all([loadInventory(), loadHistory()]);
  updateLastUpdated();
}

async function loadInventory() {
  var { data, error } = await db.from('inventory').select('*').order('clinic').order('name');
  if(error) return;
  allInventory = data || [];
  renderKPI();
  renderAlerts();
  renderConsumption();
  renderClinicSummary();
  renderInventoryTable(currentClinicFilter);
  renderClinicFilters();
}

async function loadHistory() {
  var { data, error } = await db.from('stock_history')
    .select('*').order('created_at', {ascending:false}).limit(200);
  if(error) return;
  allHistory = data || [];
  renderHistory();
  renderKPIToday();
}

// ══════════════════════════════
// KPI
// ══════════════════════════════
function renderKPI() {
  var low = allInventory.filter(function(i){ return i.quantity <= i.min_quantity; }).length;
  var clinics = [...new Set(allInventory.map(function(i){ return i.clinic; }))].length;
  document.getElementById('kpi-low').textContent = low;
  document.getElementById('kpi-total').textContent = allInventory.length;
  document.getElementById('kpi-clinics').textContent = clinics;
}

function renderKPIToday() {
  var today = new Date().toISOString().split('T')[0];
  var todayCount = allHistory.filter(function(h){
    return h.created_at && h.created_at.startsWith(today);
  }).length;
  document.getElementById('kpi-today').textContent = todayCount;
}

// ══════════════════════════════
// アラート
// ══════════════════════════════
function renderAlerts() {
  var low = allInventory.filter(function(i){ return i.quantity <= i.min_quantity; });
  document.getElementById('alert-count').textContent = low.length + '件';

  if(low.length === 0) {
    document.getElementById('alert-list').innerHTML =
      '<div style="padding:24px;text-align:center;color:var(--ink3)">⚡ 在庫不足なし</div>';
    return;
  }

  document.getElementById('alert-list').innerHTML =
    '<table><thead><tr><th>商品名</th><th>クリニック</th><th style="text-align:center">現在庫</th><th style="text-align:center">最小在庫</th><th>状態</th></tr></thead><tbody>' +
    low.map(function(item) {
      var isEmpty = item.quantity === 0;
      return '<tr>'
        + '<td style="font-weight:700">' + item.name + '</td>'
        + '<td>🏥 ' + item.clinic + '</td>'
        + '<td style="text-align:center;font-weight:800;color:var(--red);font-size:16px">' + item.quantity + '</td>'
        + '<td style="text-align:center;color:var(--ink3)">' + item.min_quantity + '</td>'
        + '<td><span class="chip ' + (isEmpty ? 'chip-red' : 'chip-amber') + '">' + (isEmpty ? '在庫切れ' : '要補充') + '</span></td>'
        + '</tr>';
    }).join('') + '</tbody></table>';
}

// ══════════════════════════════
// 消費ランキング
// ══════════════════════════════
function renderConsumption() {
  var counts = {};
  allHistory.filter(function(h){ return h.action_type === 'out'; }).forEach(function(h){
    counts[h.product_name] = (counts[h.product_name] || 0) + (h.quantity || 1);
  });

  var sorted = Object.entries(counts).sort(function(a,b){ return b[1]-a[1]; }).slice(0,10);
  var max = sorted.length > 0 ? sorted[0][1] : 1;

  if(sorted.length === 0) {
    document.getElementById('consumption-chart').innerHTML =
      '<div style="text-align:center;color:var(--ink3);padding:20px">出庫履歴がありません</div>';
    return;
  }

  var colors = ['#EA580C','#2563EB','#16A34A','#D97706','#7C3AED','#DB2777','#0891B2','#65A30D','#EA580C','#6B7280'];
  document.getElementById('consumption-chart').innerHTML = sorted.map(function(item, i) {
    var pct = Math.round(item[1] / max * 100);
    return '<div class="bar-row">'
      + '<div class="bar-label" title="' + item[0] + '">' + item[0] + '</div>'
      + '<div class="bar-wrap">'
      + '<div class="bar-fill" style="width:' + pct + '%;background:' + colors[i % colors.length] + '">'
      + '<span class="bar-val">' + item[1] + '個</span>'
      + '</div></div></div>';
  }).join('');
}

// ══════════════════════════════
// クリニック別サマリー
// ══════════════════════════════
function renderClinicSummary() {
  var clinics = [...new Set(allInventory.map(function(i){ return i.clinic; }))];

  document.getElementById('clinic-summary').innerHTML =
    '<table><thead><tr><th>クリニック</th><th style="text-align:center">品目数</th><th style="text-align:center">要補充</th><th style="text-align:center">本日出庫</th></tr></thead><tbody>' +
    clinics.map(function(clinic) {
      var items = allInventory.filter(function(i){ return i.clinic === clinic; });
      var lowCount = items.filter(function(i){ return i.quantity <= i.min_quantity; }).length;
      var today = new Date().toISOString().split('T')[0];
      var todayOut = allHistory.filter(function(h){
        return h.clinic === clinic && h.action_type === 'out' && h.created_at && h.created_at.startsWith(today);
      }).length;
      return '<tr>'
        + '<td style="font-weight:700">🏥 ' + clinic + '</td>'
        + '<td style="text-align:center">' + items.length + '</td>'
        + '<td style="text-align:center">'
          + (lowCount > 0 ? '<span class="chip chip-red">' + lowCount + '件</span>' : '<span class="chip chip-green">なし</span>')
          + '</td>'
        + '<td style="text-align:center;font-weight:700">' + todayOut + '件</td>'
        + '</tr>';
    }).join('') + '</tbody></table>';
}

// ══════════════════════════════
// クリニックフィルター
// ══════════════════════════════
function renderClinicFilters() {
  var clinics = [...new Set(allInventory.map(function(i){ return i.clinic; }))];
  var btns = '<button class="filter-btn ' + (currentClinicFilter==='all'?'active':'') + '" onclick="filterClinic(\'all\')">すべて</button>';
  btns += clinics.map(function(c) {
    return '<button class="filter-btn ' + (currentClinicFilter===c?'active':'') + '" onclick="filterClinic(\'' + c + '\')">' + c + '</button>';
  }).join('');
  document.getElementById('clinic-filters').innerHTML = btns;
}

function filterClinic(clinic) {
  currentClinicFilter = clinic;
  renderClinicFilters();
  renderInventoryTable(clinic);
}

// ══════════════════════════════
// 全在庫テーブル
// ══════════════════════════════
function renderInventoryTable(clinicFilter) {
  var data = clinicFilter === 'all' ? allInventory
    : allInventory.filter(function(i){ return i.clinic === clinicFilter; });

  document.getElementById('inv-count').textContent = data.length + '件';

  if(data.length === 0) {
    document.getElementById('inv-table').innerHTML =
      '<div style="padding:24px;text-align:center;color:var(--ink3)">データがありません</div>';
    return;
  }

  document.getElementById('inv-table').innerHTML =
    '<table><thead><tr>'
    + '<th>商品名</th><th>クリニック</th><th>カテゴリ</th>'
    + '<th style="text-align:center">在庫数</th><th style="text-align:center">最小在庫</th>'
    + '<th>有効期限</th><th>状態</th>'
    + '</tr></thead><tbody>'
    + data.map(function(item) {
        var isLow = item.quantity <= item.min_quantity;
        var isWarn = !isLow && item.quantity <= item.min_quantity * 1.5;
        var statusChip = isLow
          ? '<span class="chip chip-red">要補充</span>'
          : isWarn ? '<span class="chip chip-amber">注意</span>'
          : '<span class="chip chip-green">正常</span>';
        var expiry = item.expiry_date ? new Date(item.expiry_date) : null;
        var expiryStr = expiry ? (expiry.getMonth()+1) + '月' + expiry.getDate() + '日' : '-';
        return '<tr>'
          + '<td style="font-weight:700">' + item.name + '</td>'
          + '<td>🏥 ' + item.clinic + '</td>'
          + '<td><span class="chip chip-blue">' + (item.category||'-') + '</span></td>'
          + '<td style="text-align:center;font-weight:800;font-size:15px;color:' + (isLow?'var(--red)':'var(--ink)') + '">' + item.quantity + '</td>'
          + '<td style="text-align:center;color:var(--ink3)">' + item.min_quantity + '</td>'
          + '<td style="color:var(--ink3)">' + expiryStr + '</td>'
          + '<td>' + statusChip + '</td>'
          + '</tr>';
      }).join('')
    + '</tbody></table>';
}

// ══════════════════════════════
// 履歴
// ══════════════════════════════
function renderHistory() {
  var data = allHistory.slice(0, 50);
  if(data.length === 0) {
    document.getElementById('history-list').innerHTML =
      '<div style="padding:24px;text-align:center;color:var(--ink3)">履歴がありません</div>';
    return;
  }

  document.getElementById('history-list').innerHTML =
    '<table><thead><tr><th>日時</th><th>商品名</th><th>クリニック</th><th>種別</th><th style="text-align:center">数量</th><th>担当者</th><th>メモ</th></tr></thead><tbody>' +
    data.map(function(h) {
      var d = new Date(h.created_at);
      var timeStr = (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
      var isOut = h.action_type === 'out';
      return '<tr>'
        + '<td style="color:var(--ink3);font-size:11.5px;white-space:nowrap">' + timeStr + '</td>'
        + '<td style="font-weight:700">' + (h.product_name||'-') + '</td>'
        + '<td>🏥 ' + (h.clinic||'-') + '</td>'
        + '<td><span class="chip ' + (isOut?'chip-red':'chip-green') + '">' + (isOut?'📤 出庫':'📥 入庫') + '</span></td>'
        + '<td style="text-align:center;font-weight:800;color:' + (isOut?'var(--red)':'var(--green)') + '">' + (isOut?'-':'+') + h.quantity + '</td>'
        + '<td style="color:var(--ink3)">' + (h.staff_name||'-') + '</td>'
        + '<td style="color:var(--ink3);font-size:11.5px">' + (h.memo||'') + '</td>'
        + '</tr>';
    }).join('') + '</tbody></table>';
}

// ══════════════════════════════
// リアルタイム
// ══════════════════════════════
function startRealtime() {
  db.channel('admin-monitor')
    .on('postgres_changes', {event:'*', schema:'public', table:'inventory'}, function(){ loadInventory(); })
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'stock_history'}, function(){ loadHistory(); })
    .subscribe();
}

function updateLastUpdated() {
  var now = new Date();
  document.getElementById('last-updated').textContent =
    now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0') + ' 更新';
}
</script>
