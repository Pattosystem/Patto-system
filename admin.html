<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PattoStock 管理者ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#EA580C;--orangeL:#FFF7F0;--orangeB:#FED7AA;
  --blue:#2563EB;--blueL:#EFF6FF;
  --green:#16A34A;--greenL:#F0FDF4;
  --red:#DC2626;--redL:#FEF2F2;
  --amber:#D97706;--amberL:#FFFBEB;
  --ink:#1E293B;--ink2:#475569;--ink3:#94A3B8;
  --surf:#F8FAFC;--bdr:#E2E8F0;
}
body{font-family:'M PLUS Rounded 1c',sans-serif;background:#0F172A;color:var(--ink);min-height:100vh}

/* ログイン */
#login-screen{position:fixed;inset:0;background:#0F172A;display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:white;border-radius:20px;padding:40px;width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-logo{width:64px;height:64px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:'Outfit',sans-serif;font-size:32px;font-weight:800;color:white}
.login-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;color:var(--ink);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--ink3);margin-bottom:28px}
.login-input{width:100%;border:2px solid var(--bdr);border-radius:12px;padding:12px 16px;font-size:15px;font-family:inherit;outline:none;margin-bottom:12px;transition:border-color .15s}
.login-input:focus{border-color:var(--orange)}
.login-btn{width:100%;background:var(--orange);color:white;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer}
.login-err{color:var(--red);font-size:13px;margin-top:8px;display:none}

/* ヘッダー */
.header{background:#1E293B;border-bottom:3px solid var(--orange);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-logo{display:flex;align-items:center;gap:10px}
.header-logo-icon{width:36px;height:36px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:white}
.header-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:white}
.header-badge{background:var(--orange);color:white;font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;margin-left:6px}
.header-right{display:flex;align-items:center;gap:12px}
.sync-wrap{display:flex;align-items:center;gap:6px}
.sync-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-text{font-size:12px;color:#94A3B8;font-weight:600}
.logout-btn{background:rgba(255,255,255,.1);color:white;border:1.5px solid rgba(255,255,255,.15);border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}

/* メイン */
.main{padding:24px;max-width:1200px;margin:0 auto}

/* トップKPI */
.top-kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.kpi-card{background:white;border-radius:16px;padding:20px 24px;display:flex;align-items:center;gap:16px}
.kpi-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.kpi-icon.orange{background:var(--orangeL)}
.kpi-icon.blue{background:var(--blueL)}
.kpi-icon.red{background:var(--redL)}
.kpi-num{font-family:'Outfit',sans-serif;font-size:32px;font-weight:800;color:var(--ink);line-height:1}
.kpi-label{font-size:12px;color:var(--ink3);font-weight:600;margin-top:4px}

/* セクションタイトル */
.sec-title{font-size:14px;font-weight:800;color:white;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-badge{background:rgba(255,255,255,.1);color:#94A3B8;font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px}

/* クリニックカード一覧 */
.clinic-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.clinic-card{background:white;border-radius:16px;padding:20px 24px;cursor:pointer;transition:all .15s;border:2.5px solid transparent;display:flex;align-items:center;gap:16px}
.clinic-card:hover{border-color:var(--orange);box-shadow:0 4px 20px rgba(234,88,12,.15)}
.clinic-card.active{border-color:var(--orange);background:var(--orangeL)}
.clinic-avatar{width:44px;height:44px;background:var(--orange);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:white;flex-shrink:0}
.clinic-name{font-size:16px;font-weight:800;color:var(--ink)}
.clinic-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.clinic-stats{display:flex;gap:20px;margin-left:auto;flex-shrink:0}
.clinic-stat{text-align:center}
.clinic-stat-num{font-family:'Outfit',sans-serif;font-size:24px;font-weight:800;color:var(--ink)}
.clinic-stat-label{font-size:11px;color:var(--ink3);font-weight:600}
.clinic-stat-num.red{color:var(--red)}
.clinic-stat-num.orange{color:var(--orange)}
.clinic-arrow{font-size:20px;color:var(--ink3);margin-left:12px}

/* 詳細パネル */
#detail-panel{display:none}
.detail-header{background:white;border-radius:16px;padding:20px 24px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.detail-clinic-name{font-size:20px;font-weight:800;color:var(--ink)}
.detail-clinic-sub{font-size:13px;color:var(--ink3);margin-top:3px}
.back-btn{background:var(--surf);color:var(--ink2);border:1.5px solid var(--bdr);border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:var(--orange);color:var(--orange)}

/* 詳細KPI */
.detail-kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.dkpi{background:white;border-radius:12px;padding:16px 20px}
.dkpi-num{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:var(--ink);line-height:1}
.dkpi-num.red{color:var(--red)}
.dkpi-num.orange{color:var(--orange)}
.dkpi-label{font-size:12px;color:var(--ink3);font-weight:600;margin-top:4px}

/* 在庫テーブル */
.inv-card{background:white;border-radius:16px;overflow:hidden;margin-bottom:16px}
.inv-card-header{padding:14px 20px;border-bottom:2px solid var(--bdr);background:var(--surf);display:flex;align-items:center;justify-content:space-between}
.inv-card-title{font-size:13px;font-weight:800;color:var(--ink)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:9px 16px;background:var(--surf);color:var(--ink3);font-size:11px;font-weight:700}
td{padding:11px 16px;border-bottom:1.5px solid var(--bdr);color:var(--ink)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFCFF}
.chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700}
.chip-red{background:var(--redL);color:var(--red)}
.chip-green{background:var(--greenL);color:var(--green)}
.chip-amber{background:var(--amberL);color:var(--amber)}

/* ローディング */
.loading{text-align:center;padding:40px;color:#64748B}
.spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ログイン -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">P</div>
    <div class="login-title">管理者ダッシュボード</div>
    <div class="login-sub">PattoStock 提供者専用</div>
    <input class="login-input" type="password" id="login-pass" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="login-err">パスワードが違います</div>
  </div>
</div>

<!-- メイン -->
<div id="main-screen" style="display:none">
  <div class="header">
    <div class="header-logo">
      <div class="header-logo-icon">P</div>
      <div class="header-title">PattoStock</div>
      <span class="header-badge">提供者管理画面</span>
    </div>
    <div class="header-right">
      <div class="sync-wrap">
        <div class="sync-dot"></div>
        <span class="sync-text" id="sync-status">接続中...</span>
      </div>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <div class="main">

    <!-- トップKPI -->
    <div class="top-kpi">
      <div class="kpi-card">
        <div class="kpi-icon blue">🏥</div>
        <div>
          <div class="kpi-num" id="kpi-clinics">-</div>
          <div class="kpi-label">登録クリニック数</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon orange">📦</div>
        <div>
          <div class="kpi-num" id="kpi-monthly">-</div>
          <div class="kpi-label">今月の総出庫数（全体）</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon red">⚠️</div>
        <div>
          <div class="kpi-num" id="kpi-low">-</div>
          <div class="kpi-label">在庫不足アイテム（全体）</div>
        </div>
      </div>
    </div>

    <!-- クリニック一覧 -->
    <div id="list-view">
      <div class="sec-title">🏥 クリニック一覧 <span class="sec-badge" id="clinic-count">0件</span></div>
      <div class="clinic-grid" id="clinic-list">
        <div class="loading"><div class="spinner"></div>読み込み中...</div>
      </div>
    </div>

    <!-- 詳細パネル -->
    <div id="detail-panel">
      <div class="detail-header">
        <div>
          <div class="detail-clinic-name" id="detail-name">-</div>
          <div class="detail-clinic-sub" id="detail-sub">-</div>
        </div>
        <button class="back-btn" onclick="showList()">← クリニック一覧に戻る</button>
      </div>

      <div class="detail-kpi">
        <div class="dkpi">
          <div class="dkpi-num" id="d-total">-</div>
          <div class="dkpi-label">📦 登録品目数</div>
        </div>
        <div class="dkpi">
          <div class="dkpi-num orange" id="d-monthly">-</div>
          <div class="dkpi-label">📊 今月の出庫数</div>
        </div>
        <div class="dkpi">
          <div class="dkpi-num red" id="d-low">-</div>
          <div class="dkpi-label">⚠️ 要補充アイテム</div>
        </div>
      </div>

      <div class="sec-title">📦 在庫一覧</div>
      <div class="inv-card">
        <div id="detail-inv-table"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://aeacglgdhskyaachsmdx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sZDmywDiTTWd5cEIXgMY7w_ZxTYKN14';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const ADMIN_PASSWORD = 'patto2026';

var allInventory = [];
var allHistory = [];

// ログイン
function doLogin() {
  var pass = document.getElementById('login-pass').value;
  if(pass === ADMIN_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    sessionStorage.setItem('admin_auth', '1');
    loadAll();
    startRealtime();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('login-pass').value = '';
  }
}
function doLogout() { sessionStorage.removeItem('admin_auth'); location.reload(); }

if(sessionStorage.getItem('admin_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  loadAll(); startRealtime();
}

// データ読み込み
async function loadAll() {
  var r1 = await db.from('inventory').select('*').order('name');
  var r2 = await db.from('stock_history').select('*').order('created_at', {ascending:false}).limit(500);
  allInventory = r1.data || [];
  allHistory = r2.data || [];
  renderAll();
}

// ══════════════════════════════
// クリニック（法人）グルーピング
// ══════════════════════════════
// 現状のデータは店舗単位（銀座本院・渋谷分院など）
// 同じ法人の店舗をまとめるためのマッピング
// ※ 実際の運用では、クライアントごとにプロジェクトID等で管理するのが理想
// 今は「店舗名」をそのままクリニック名として表示（将来的に法人マスター追加予定）

function getClinicGroups() {
  // 全店舗を取得してグループ化
  // 現状は店舗＝クリニックとして扱い、将来的に法人マスターで統合
  var stores = [...new Set(allInventory.map(function(i){ return i.clinic; }))].filter(Boolean);
  return stores.map(function(store) {
    var items = allInventory.filter(function(i){ return i.clinic === store; });
    var lowItems = items.filter(function(i){ return i.quantity <= i.min_quantity; });
    var thisMonth = getThisMonthStart();
    var monthlyOut = allHistory.filter(function(h){
      return h.clinic === store && h.action_type === 'out'
        && h.created_at && new Date(h.created_at) >= thisMonth;
    }).reduce(function(sum, h){ return sum + (h.quantity || 0); }, 0);
    return {
      name: store,
      itemCount: items.length,
      lowCount: lowItems.length,
      monthlyOut: monthlyOut,
      items: items
    };
  });
}

function getThisMonthStart() {
  var now = new Date();
  return new Date(now.getFullYear(), now.getMonth(), 1);
}

// ══════════════════════════════
// 全体描画
// ══════════════════════════════
function renderAll() {
  var groups = getClinicGroups();

  // トップKPI
  document.getElementById('kpi-clinics').textContent = groups.length;
  var totalLow = groups.reduce(function(s,g){ return s + g.lowCount; }, 0);
  var totalOut = groups.reduce(function(s,g){ return s + g.monthlyOut; }, 0);
  document.getElementById('kpi-low').textContent = totalLow;
  document.getElementById('kpi-monthly').textContent = totalOut + '個';
  document.getElementById('clinic-count').textContent = groups.length + '件';

  // クリニックカード
  if(groups.length === 0) {
    document.getElementById('clinic-list').innerHTML =
      '<div style="text-align:center;color:#64748B;padding:40px">データがありません</div>';
    return;
  }

  document.getElementById('clinic-list').innerHTML = groups.map(function(g, i) {
    var initial = g.name.charAt(0);
    return '<div class="clinic-card" onclick="showDetail(\'' + g.name + '\')">'
      + '<div class="clinic-avatar">' + initial + '</div>'
      + '<div style="flex:1">'
      + '<div class="clinic-name">' + g.name + '</div>'
      + '<div class="clinic-sub">登録品目：' + g.itemCount + '品目</div>'
      + '</div>'
      + '<div class="clinic-stats">'
      + '<div class="clinic-stat">'
      + '<div class="clinic-stat-num orange">' + g.monthlyOut + '<span style="font-size:12px;font-weight:600;color:var(--ink3)">個</span></div>'
      + '<div class="clinic-stat-label">今月の出庫数</div>'
      + '</div>'
      + '<div class="clinic-stat">'
      + '<div class="clinic-stat-num ' + (g.lowCount > 0 ? 'red' : '') + '">' + g.lowCount + '<span style="font-size:12px;font-weight:600;color:var(--ink3)">件</span></div>'
      + '<div class="clinic-stat-label">要補充</div>'
      + '</div>'
      + '</div>'
      + '<div class="clinic-arrow">›</div>'
      + '</div>';
  }).join('');
}

// ══════════════════════════════
// 詳細表示
// ══════════════════════════════
function showDetail(clinicName) {
  var groups = getClinicGroups();
  var g = groups.find(function(x){ return x.name === clinicName; });
  if(!g) return;

  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-panel').style.display = 'block';

  document.getElementById('detail-name').textContent = g.name;
  document.getElementById('detail-sub').textContent =
    '登録品目：' + g.itemCount + '品目　／　今月出庫：' + g.monthlyOut + '個　／　要補充：' + g.lowCount + '件';
  document.getElementById('d-total').textContent = g.itemCount;
  document.getElementById('d-monthly').textContent = g.monthlyOut + '個';
  document.getElementById('d-low').textContent = g.lowCount + '件';

  // 在庫テーブル
  var sorted = g.items.slice().sort(function(a,b){
    return (a.quantity <= a.min_quantity ? 0 : 1) - (b.quantity <= b.min_quantity ? 0 : 1);
  });

  // 各商品の今月の出庫数
  var thisMonth = getThisMonthStart();

  document.getElementById('detail-inv-table').innerHTML =
    '<table><thead><tr>'
    + '<th>商品名</th>'
    + '<th style="text-align:center">現在庫</th>'
    + '<th style="text-align:center">最小在庫</th>'
    + '<th style="text-align:center">今月の出庫数</th>'
    + '<th>状態</th>'
    + '</tr></thead><tbody>'
    + sorted.map(function(item) {
        var isLow = item.quantity <= item.min_quantity;
        var isWarn = !isLow && item.quantity <= item.min_quantity * 1.5;
        var monthlyOut = allHistory.filter(function(h){
          return h.product_name === item.name && h.clinic === item.clinic
            && h.action_type === 'out' && h.created_at && new Date(h.created_at) >= thisMonth;
        }).reduce(function(sum, h){ return sum + (h.quantity || 0); }, 0);

        return '<tr>'
          + '<td style="font-weight:700">' + item.name + '</td>'
          + '<td style="text-align:center;font-size:16px;font-weight:800;color:' + (isLow?'var(--red)':'var(--ink)') + '">' + item.quantity + '</td>'
          + '<td style="text-align:center;color:var(--ink3)">' + item.min_quantity + '</td>'
          + '<td style="text-align:center;font-weight:700;color:var(--orange)">' + (monthlyOut > 0 ? monthlyOut + '個' : '-') + '</td>'
          + '<td><span class="chip ' + (isLow?'chip-red':isWarn?'chip-amber':'chip-green') + '">'
          + (isLow?'要補充':isWarn?'注意':'正常') + '</span></td>'
          + '</tr>';
      }).join('')
    + '</tbody></table>';
}

function showList() {
  document.getElementById('detail-panel').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
}

// リアルタイム
function startRealtime() {
  db.channel('admin-rt')
    .on('postgres_changes', {event:'*', schema:'public', table:'inventory'}, function(){ loadAll(); })
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'stock_history'}, function(){ loadAll(); })
    .subscribe(function(status){
      document.getElementById('sync-status').textContent = status==='SUBSCRIBED'?'リアルタイム監視中':'接続中...';
    });
}
</script>
</body>
</html>
