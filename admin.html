<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PattoStock 管理者ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#EA580C;--orangeL:#FFF7F0;--orangeB:#FED7AA;
  --blue:#2563EB;--blueL:#EFF6FF;
  --green:#16A34A;--greenL:#F0FDF4;
  --red:#DC2626;--redL:#FEF2F2;
  --amber:#D97706;--amberL:#FFFBEB;
  --ink:#1E293B;--ink2:#475569;--ink3:#94A3B8;
  --surf:#F8FAFC;--bdr:#E2E8F0;
}
body{font-family:'M PLUS Rounded 1c',sans-serif;background:#0F172A;color:var(--ink);min-height:100vh}

/* ログイン */
#login-screen{position:fixed;inset:0;background:#0F172A;display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:white;border-radius:20px;padding:40px;width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-logo{width:64px;height:64px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:'Outfit',sans-serif;font-size:32px;font-weight:800;color:white}
.login-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;color:var(--ink);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--ink3);margin-bottom:28px}
.login-input{width:100%;border:2px solid var(--bdr);border-radius:12px;padding:12px 16px;font-size:15px;font-family:inherit;outline:none;margin-bottom:12px;transition:border-color .15s}
.login-input:focus{border-color:var(--orange)}
.login-btn{width:100%;background:var(--orange);color:white;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer}
.login-err{color:var(--red);font-size:13px;margin-top:8px;display:none}

/* ヘッダー */
.header{background:#1E293B;border-bottom:3px solid var(--orange);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-logo{display:flex;align-items:center;gap:10px}
.header-logo-icon{width:36px;height:36px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:white}
.header-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:white}
.header-badge{background:var(--orange);color:white;font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;margin-left:6px}
.header-right{display:flex;align-items:center;gap:12px}
.sync-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-text{font-size:12px;color:#94A3B8;font-weight:600}
.logout-btn{background:rgba(255,255,255,.1);color:white;border:1.5px solid rgba(255,255,255,.15);border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}

/* タブナビ */
.tab-nav{display:flex;gap:4px;padding:16px 24px 0;border-bottom:2px solid rgba(255,255,255,.08)}
.tab-btn{background:transparent;color:#64748B;border:none;padding:10px 20px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab-btn.active{color:var(--orange);border-bottom-color:var(--orange)}
.tab-btn:hover{color:white}

/* メイン */
.main{padding:24px;max-width:1200px;margin:0 auto}

/* トップKPI */
.top-kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:white;border-radius:16px;padding:20px 24px;display:flex;align-items:center;gap:16px}
.kpi-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.kpi-icon.orange{background:var(--orangeL)}
.kpi-icon.blue{background:var(--blueL)}
.kpi-icon.red{background:var(--redL)}
.kpi-num{font-family:'Outfit',sans-serif;font-size:32px;font-weight:800;color:var(--ink);line-height:1}
.kpi-label{font-size:12px;color:var(--ink3);font-weight:600;margin-top:4px}

/* セクションタイトル */
.sec-title{font-size:14px;font-weight:800;color:white;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-badge{background:rgba(255,255,255,.1);color:#94A3B8;font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px}

/* クリニックカード */
.clinic-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.clinic-card{background:white;border-radius:16px;padding:20px 24px;cursor:pointer;transition:all .15s;border:2.5px solid transparent;display:flex;align-items:center;gap:16px}
.clinic-card:hover{border-color:var(--orange);box-shadow:0 4px 20px rgba(234,88,12,.15)}
.clinic-avatar{width:44px;height:44px;background:var(--orange);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:white;flex-shrink:0}
.clinic-name{font-size:16px;font-weight:800;color:var(--ink)}
.clinic-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.clinic-stats{display:flex;gap:20px;margin-left:auto;flex-shrink:0}
.clinic-stat{text-align:center}
.clinic-stat-num{font-family:'Outfit',sans-serif;font-size:24px;font-weight:800;color:var(--ink)}
.clinic-stat-num.red{color:var(--red)}
.clinic-stat-num.orange{color:var(--orange)}
.clinic-stat-label{font-size:11px;color:var(--ink3);font-weight:600}
.clinic-arrow{font-size:20px;color:var(--ink3);margin-left:8px}

/* 詳細 */
.detail-header{background:white;border-radius:16px;padding:20px 24px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.detail-clinic-name{font-size:20px;font-weight:800;color:var(--ink)}
.detail-clinic-sub{font-size:13px;color:var(--ink3);margin-top:3px}
.back-btn{background:var(--surf);color:var(--ink2);border:1.5px solid var(--bdr);border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
.back-btn:hover{border-color:var(--orange);color:var(--orange)}
.detail-kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.dkpi{background:white;border-radius:12px;padding:16px 20px}
.dkpi-num{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:var(--ink);line-height:1}
.dkpi-num.red{color:var(--red)}
.dkpi-num.orange{color:var(--orange)}
.dkpi-label{font-size:12px;color:var(--ink3);font-weight:600;margin-top:4px}

/* 法人管理フォーム */
.form-card{background:white;border-radius:16px;padding:24px;margin-bottom:16px}
.form-title{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.form-full{grid-column:1/-1}
.form-label{font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:4px;display:block}
.form-input{width:100%;border:1.5px solid var(--bdr);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--orange)}
.form-select{width:100%;border:1.5px solid var(--bdr);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;appearance:none;background:white}
.save-btn{background:var(--orange);color:white;border:none;border-radius:10px;padding:10px 24px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;transition:all .15s}
.save-btn:hover{background:#C2410C}
.cancel-btn{background:var(--surf);color:var(--ink2);border:1.5px solid var(--bdr);border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;margin-right:8px}

/* テーブル */
.tbl-card{background:white;border-radius:16px;overflow:hidden;margin-bottom:16px}
.tbl-header{padding:14px 20px;border-bottom:2px solid var(--bdr);background:var(--surf);display:flex;align-items:center;justify-content:space-between}
.tbl-title{font-size:13px;font-weight:800;color:var(--ink)}
.add-btn{background:var(--orange);color:white;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:9px 16px;background:var(--surf);color:var(--ink3);font-size:11px;font-weight:700}
td{padding:11px 16px;border-bottom:1.5px solid var(--bdr);color:var(--ink)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFCFF}
.chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700}
.chip-red{background:var(--redL);color:var(--red)}
.chip-green{background:var(--greenL);color:var(--green)}
.chip-amber{background:var(--amberL);color:var(--amber)}
.chip-blue{background:var(--blueL);color:var(--blue)}
.del-btn{background:var(--redL);color:var(--red);border:1px solid #FECACA;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.edit-btn{background:var(--blueL);color:var(--blue);border:1px solid #BFDBFE;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-right:4px}

/* ローディング */
.loading{text-align:center;padding:40px;color:#64748B}
.spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* トースト */
.toasts{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1E293B;border:1.5px solid #334155;color:white;border-radius:12px;padding:12px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:tin .2s ease}
@keyframes tin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:20px;padding:28px;width:500px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-title{font-size:17px;font-weight:800;color:var(--ink);margin-bottom:20px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
</style>
</head>
<body>

<!-- ログイン -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">P</div>
    <div class="login-title">管理者ダッシュボード</div>
    <div class="login-sub">PattoStock 提供者専用</div>
    <input class="login-input" type="password" id="login-pass" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="login-err">パスワードが違います</div>
  </div>
</div>

<!-- メイン -->
<div id="main-screen" style="display:none">
  <div class="header">
    <div class="header-logo">
      <div class="header-logo-icon">P</div>
      <div class="header-title">PattoStock</div>
      <span class="header-badge">提供者管理画面</span>
    </div>
    <div class="header-right">
      <div style="display:flex;align-items:center;gap:6px">
        <div class="sync-dot"></div>
        <span class="sync-text" id="sync-status">接続中...</span>
      </div>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <!-- タブ -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="showTab('dashboard')">📊 ダッシュボード</button>
    <button class="tab-btn" onclick="showTab('corporations')">🏢 法人マスター</button>
  </div>

  <div class="main">

    <!-- ダッシュボードタブ -->
    <div id="tab-dashboard">
      <div class="top-kpi">
        <div class="kpi-card">
          <div class="kpi-icon blue">🏢</div>
          <div>
            <div class="kpi-num" id="kpi-corps">-</div>
            <div class="kpi-label">登録法人数（クライアント数）</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon orange">📊</div>
          <div>
            <div class="kpi-num" id="kpi-monthly">-</div>
            <div class="kpi-label">今月の総出庫数（全体）</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon red">⚠️</div>
          <div>
            <div class="kpi-num" id="kpi-low">-</div>
            <div class="kpi-label">在庫不足アイテム（全体）</div>
          </div>
        </div>
      </div>

      <!-- クリニック一覧 -->
      <div id="list-view">
        <div class="sec-title">🏢 法人・クリニック一覧 <span class="sec-badge" id="corp-count">0件</span></div>
        <div class="clinic-grid" id="clinic-list">
          <div class="loading"><div class="spinner"></div>読み込み中...</div>
        </div>
      </div>

      <!-- 詳細 -->
      <div id="detail-view" style="display:none">
        <div class="detail-header">
          <div>
            <div class="detail-clinic-name" id="detail-name">-</div>
            <div class="detail-clinic-sub" id="detail-sub">-</div>
          </div>
          <button class="back-btn" onclick="showList()">← 一覧に戻る</button>
        </div>
        <div class="detail-kpi">
          <div class="dkpi">
            <div class="dkpi-num" id="d-total">-</div>
            <div class="dkpi-label">📦 登録品目数</div>
          </div>
          <div class="dkpi">
            <div class="dkpi-num orange" id="d-monthly">-</div>
            <div class="dkpi-label">📊 今月の出庫数</div>
          </div>
          <div class="dkpi">
            <div class="dkpi-num red" id="d-low">-</div>
            <div class="dkpi-label">⚠️ 要補充アイテム</div>
          </div>
        </div>
        <div class="sec-title">📦 在庫一覧</div>
        <div class="tbl-card">
          <div id="detail-inv-table"><div class="loading"><div class="spinner"></div></div></div>
        </div>
      </div>
    </div>

    <!-- 法人マスタータブ -->
    <div id="tab-corporations" style="display:none">

      <!-- 法人登録フォーム -->
      <div class="tbl-card" style="margin-bottom:16px">
        <div class="tbl-header">
          <div class="tbl-title">🏢 法人一覧</div>
          <button class="add-btn" onclick="openCorpModal()">＋ 法人を追加</button>
        </div>
        <div id="corp-table">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- 店舗→法人 紐付け -->
      <div class="tbl-card">
        <div class="tbl-header">
          <div class="tbl-title">🔗 店舗と法人の紐付け</div>
        </div>
        <div id="store-mapping-table">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- 法人登録モーダル -->
<div class="modal-overlay" id="corp-modal">
  <div class="modal">
    <div class="modal-title" id="corp-modal-title">🏢 法人を追加</div>
    <input type="hidden" id="corp-edit-id">
    <div class="form-grid">
      <div class="form-full">
        <label class="form-label">法人名 *</label>
        <input class="form-input" id="corp-name" placeholder="例: Tクリニックグループ">
      </div>
      <div>
        <label class="form-label">担当者名</label>
        <input class="form-input" id="corp-contact" placeholder="例: 田中 院長">
      </div>
      <div>
        <label class="form-label">電話番号</label>
        <input class="form-input" id="corp-tel" placeholder="例: 03-1234-5678">
      </div>
      <div class="form-full">
        <label class="form-label">メールアドレス</label>
        <input class="form-input" id="corp-email" type="email" placeholder="例: info@t-clinic.jp">
      </div>
      <div class="form-full">
        <label class="form-label">メモ</label>
        <input class="form-input" id="corp-memo" placeholder="例: 導入日・契約プランなど">
      </div>
    </div>
    <div class="modal-footer">
      <button class="cancel-btn" onclick="closeCorpModal()">キャンセル</button>
      <button class="save-btn" onclick="saveCorp()">保存する</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
const SUPABASE_URL = 'https://aeacglgdhskyaachsmdx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sZDmywDiTTWd5cEIXgMY7w_ZxTYKN14';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const ADMIN_PASSWORD = 'patto2026';

var allInventory = [];
var allHistory = [];
var allCorps = [];

// ログイン
function doLogin() {
  var pass = document.getElementById('login-pass').value;
  if(pass === ADMIN_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    sessionStorage.setItem('admin_auth','1');
    loadAll(); startRealtime();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('login-pass').value = '';
  }
}
function doLogout(){ sessionStorage.removeItem('admin_auth'); location.reload(); }
if(sessionStorage.getItem('admin_auth')==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
  loadAll(); startRealtime();
}

// タブ切替
function showTab(name) {
  ['dashboard','corporations'].forEach(function(t){
    document.getElementById('tab-'+t).style.display = t===name?'block':'none';
  });
  document.querySelectorAll('.tab-btn').forEach(function(b,i){
    b.classList.toggle('active', i===(name==='dashboard'?0:1));
  });
  if(name==='corporations') renderCorpTab();
}

// データ読み込み
async function loadAll() {
  var [r1, r2, r3] = await Promise.all([
    db.from('inventory').select('*').order('name'),
    db.from('stock_history').select('*').order('created_at',{ascending:false}).limit(500),
    db.from('corporations').select('*').order('name')
  ]);
  allInventory = r1.data || [];
  allHistory = r2.data || [];
  allCorps = r3.data || [];
  renderDashboard();
}

// ══════════════════════════════
// ダッシュボード
// ══════════════════════════════
function getThisMonthStart(){ var n=new Date(); return new Date(n.getFullYear(),n.getMonth(),1); }

function getGroups() {
  // 法人に紐付いた店舗をまとめる
  // corporation_idが設定されている在庫は法人でグループ化
  // 未設定の在庫は店舗名でグループ化
  var groups = {};

  allInventory.forEach(function(item) {
    var key, label, sub;
    if(item.corporation_id) {
      var corp = allCorps.find(function(c){ return c.id === item.corporation_id; });
      if(corp) {
        key = 'corp_' + corp.id;
        label = corp.name;
        sub = '法人登録済み';
      } else {
        key = 'store_' + item.clinic;
        label = item.clinic;
        sub = '未紐付け';
      }
    } else {
      key = 'store_' + item.clinic;
      label = item.clinic;
      sub = '未紐付け';
    }
    if(!groups[key]) groups[key] = {key:key, name:label, sub:sub, items:[], stores:new Set()};
    groups[key].items.push(item);
    groups[key].stores.add(item.clinic);
  });

  return Object.values(groups).map(function(g) {
    var thisMonth = getThisMonthStart();
    var storeArr = [...g.stores];
    var monthlyOut = allHistory.filter(function(h){
      return storeArr.includes(h.clinic) && h.action_type==='out'
        && h.created_at && new Date(h.created_at) >= thisMonth;
    }).reduce(function(s,h){ return s+(h.quantity||0); }, 0);
    var lowCount = g.items.filter(function(i){ return i.quantity <= i.min_quantity; }).length;
    return Object.assign({}, g, {monthlyOut:monthlyOut, lowCount:lowCount, stores:storeArr});
  });
}

function renderDashboard() {
  var groups = getGroups();
  var corpCount = allCorps.length || groups.length;
  document.getElementById('kpi-corps').textContent = corpCount;
  var totalOut = groups.reduce(function(s,g){ return s+g.monthlyOut; }, 0);
  var totalLow = groups.reduce(function(s,g){ return s+g.lowCount; }, 0);
  document.getElementById('kpi-monthly').textContent = totalOut + '個';
  document.getElementById('kpi-low').textContent = totalLow;
  document.getElementById('corp-count').textContent = groups.length + '件';

  document.getElementById('clinic-list').innerHTML = groups.map(function(g) {
    var initial = g.name.charAt(0);
    var storeInfo = g.stores.length > 1 ? g.stores.length + '店舗' : g.stores[0] || '';
    return '<div class="clinic-card" onclick="showDetail(\'' + encodeURIComponent(g.key) + '\')">'
      + '<div class="clinic-avatar">' + initial + '</div>'
      + '<div style="flex:1">'
      + '<div class="clinic-name">' + g.name + '</div>'
      + '<div class="clinic-sub">' + storeInfo + '　登録品目：' + g.items.length + '品目</div>'
      + '</div>'
      + '<div class="clinic-stats">'
      + '<div class="clinic-stat">'
      + '<div class="clinic-stat-num orange">' + g.monthlyOut + '<span style="font-size:12px;font-weight:600;color:var(--ink3)">個</span></div>'
      + '<div class="clinic-stat-label">今月の出庫数</div>'
      + '</div>'
      + '<div class="clinic-stat">'
      + '<div class="clinic-stat-num ' + (g.lowCount>0?'red':'') + '">' + g.lowCount + '<span style="font-size:12px;font-weight:600;color:var(--ink3)">件</span></div>'
      + '<div class="clinic-stat-label">要補充</div>'
      + '</div>'
      + '</div>'
      + '<div class="clinic-arrow">›</div>'
      + '</div>';
  }).join('') || '<div style="text-align:center;color:#64748B;padding:40px">データがありません</div>';
}

function showDetail(keyEncoded) {
  var key = decodeURIComponent(keyEncoded);
  var groups = getGroups();
  var g = groups.find(function(x){ return x.key === key; });
  if(!g) return;

  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('detail-name').textContent = g.name;
  document.getElementById('detail-sub').textContent = g.stores.join('・');
  document.getElementById('d-total').textContent = g.items.length;
  document.getElementById('d-monthly').textContent = g.monthlyOut + '個';
  document.getElementById('d-low').textContent = g.lowCount + '件';

  var thisMonth = getThisMonthStart();
  var sorted = g.items.slice().sort(function(a,b){
    return (a.quantity<=a.min_quantity?0:1)-(b.quantity<=b.min_quantity?0:1);
  });

  document.getElementById('detail-inv-table').innerHTML =
    '<table><thead><tr>'
    + '<th>商品名</th><th>店舗</th>'
    + '<th style="text-align:center">現在庫</th>'
    + '<th style="text-align:center">今月の出庫数</th>'
    + '<th>状態</th>'
    + '</tr></thead><tbody>'
    + sorted.map(function(item) {
        var isLow = item.quantity <= item.min_quantity;
        var isWarn = !isLow && item.quantity <= item.min_quantity * 1.5;
        var monthlyOut = allHistory.filter(function(h){
          return h.product_name===item.name && h.clinic===item.clinic
            && h.action_type==='out' && h.created_at && new Date(h.created_at)>=thisMonth;
        }).reduce(function(s,h){ return s+(h.quantity||0); }, 0);
        return '<tr>'
          + '<td style="font-weight:700">' + item.name + '</td>'
          + '<td style="color:var(--ink3)">' + item.clinic + '</td>'
          + '<td style="text-align:center;font-size:16px;font-weight:800;color:' + (isLow?'var(--red)':'var(--ink)') + '">' + item.quantity + '</td>'
          + '<td style="text-align:center;font-weight:700;color:var(--orange)">' + (monthlyOut>0?monthlyOut+'個':'-') + '</td>'
          + '<td><span class="chip ' + (isLow?'chip-red':isWarn?'chip-amber':'chip-green') + '">'
          + (isLow?'要補充':isWarn?'注意':'正常') + '</span></td>'
          + '</tr>';
      }).join('')
    + '</tbody></table>';
}

function showList() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
}

// ══════════════════════════════
// 法人マスター管理
// ══════════════════════════════
function renderCorpTab() {
  // 法人一覧
  if(allCorps.length === 0) {
    document.getElementById('corp-table').innerHTML =
      '<div style="padding:24px;text-align:center;color:var(--ink3)">法人が登録されていません。「＋ 法人を追加」から登録してください。</div>';
  } else {
    document.getElementById('corp-table').innerHTML =
      '<table><thead><tr><th>法人名</th><th>担当者</th><th>電話番号</th><th>メール</th><th>メモ</th><th>操作</th></tr></thead><tbody>'
      + allCorps.map(function(c) {
          return '<tr>'
            + '<td style="font-weight:700">' + c.name + '</td>'
            + '<td>' + (c.contact_name||'-') + '</td>'
            + '<td>' + (c.contact_tel||'-') + '</td>'
            + '<td style="color:var(--blue)">' + (c.contact_email||'-') + '</td>'
            + '<td style="color:var(--ink3);font-size:11.5px">' + (c.memo||'-') + '</td>'
            + '<td><button class="edit-btn" onclick="editCorp(' + c.id + ')">編集</button>'
            + '<button class="del-btn" onclick="deleteCorp(' + c.id + ',\'' + c.name + '\')">削除</button></td>'
            + '</tr>';
        }).join('')
      + '</tbody></table>';
  }

  // 店舗→法人 紐付けテーブル
  var stores = [...new Set(allInventory.map(function(i){ return i.clinic; }))].filter(Boolean);
  if(stores.length === 0) {
    document.getElementById('store-mapping-table').innerHTML =
      '<div style="padding:24px;text-align:center;color:var(--ink3)">在庫データがありません</div>';
    return;
  }

  var corpOptions = '<option value="">── 未紐付け ──</option>'
    + allCorps.map(function(c){ return '<option value="' + c.id + '">' + c.name + '</option>'; }).join('');

  // 各店舗の現在の紐付け状態を取得（inventoryテーブルのcorporation_idから）
  var storeCorpMap = {};
  allInventory.forEach(function(item) {
    if(item.clinic && item.corporation_id) {
      storeCorpMap[item.clinic] = item.corporation_id;
    }
  });

  document.getElementById('store-mapping-table').innerHTML =
    '<table><thead><tr><th>店舗名</th><th>品目数</th><th>紐付け法人</th><th>操作</th></tr></thead><tbody>'
    + stores.map(function(store) {
        var items = allInventory.filter(function(i){ return i.clinic === store; });
        var currentCorpId = storeCorpMap[store] || '';
        var currentCorp = allCorps.find(function(c){ return c.id === currentCorpId; });
        return '<tr>'
          + '<td style="font-weight:700">' + store + '</td>'
          + '<td>' + items.length + '品目</td>'
          + '<td>'
          + '<select class="form-select" id="mapping-' + store + '" style="width:200px;padding:6px 10px;font-size:12px">'
          + corpOptions.replace('value="' + currentCorpId + '"', 'value="' + currentCorpId + '" selected')
          + '</select>'
          + '</td>'
          + '<td><button class="save-btn" style="padding:6px 14px;font-size:12px" onclick="saveMapping(\'' + store + '\')">保存</button></td>'
          + '</tr>';
      }).join('')
    + '</tbody></table>';
}

// 法人モーダル
function openCorpModal() {
  document.getElementById('corp-modal-title').textContent = '🏢 法人を追加';
  document.getElementById('corp-edit-id').value = '';
  ['corp-name','corp-contact','corp-tel','corp-email','corp-memo'].forEach(function(id){
    document.getElementById(id).value = '';
  });
  document.getElementById('corp-modal').classList.add('open');
}

function editCorp(id) {
  var corp = allCorps.find(function(c){ return c.id === id; });
  if(!corp) return;
  document.getElementById('corp-modal-title').textContent = '🏢 法人を編集';
  document.getElementById('corp-edit-id').value = id;
  document.getElementById('corp-name').value = corp.name || '';
  document.getElementById('corp-contact').value = corp.contact_name || '';
  document.getElementById('corp-tel').value = corp.contact_tel || '';
  document.getElementById('corp-email').value = corp.contact_email || '';
  document.getElementById('corp-memo').value = corp.memo || '';
  document.getElementById('corp-modal').classList.add('open');
}

function closeCorpModal() {
  document.getElementById('corp-modal').classList.remove('open');
}

async function saveCorp() {
  var name = document.getElementById('corp-name').value.trim();
  if(!name){ toast('⚠️','法人名を入力してください'); return; }
  var editId = document.getElementById('corp-edit-id').value;
  var data = {
    name: name,
    contact_name: document.getElementById('corp-contact').value.trim(),
    contact_tel: document.getElementById('corp-tel').value.trim(),
    contact_email: document.getElementById('corp-email').value.trim(),
    memo: document.getElementById('corp-memo').value.trim()
  };

  var error;
  if(editId) {
    var r = await db.from('corporations').update(data).eq('id', editId);
    error = r.error;
  } else {
    var r = await db.from('corporations').insert(data);
    error = r.error;
  }

  if(error){ toast('❌','保存に失敗しました'); return; }
  toast('✅', '「' + name + '」を' + (editId?'更新':'登録') + 'しました');
  closeCorpModal();
  await loadAll();
  renderCorpTab();
}

async function deleteCorp(id, name) {
  if(!confirm('「' + name + '」を削除しますか？\n（紐付けされた店舗の法人情報も解除されます）')) return;
  await db.from('inventory').update({corporation_id: null}).eq('corporation_id', id);
  var { error } = await db.from('corporations').delete().eq('id', id);
  if(error){ toast('❌','削除に失敗しました'); return; }
  toast('🗑️', '「' + name + '」を削除しました');
  await loadAll();
  renderCorpTab();
}

// 店舗→法人 紐付け保存
async function saveMapping(store) {
  var sel = document.getElementById('mapping-' + store);
  var corpId = sel.value ? parseInt(sel.value) : null;
  var { error } = await db.from('inventory')
    .update({ corporation_id: corpId })
    .eq('clinic', store);
  if(error){ toast('❌','保存に失敗しました'); return; }
  var corpName = corpId ? (allCorps.find(function(c){ return c.id===corpId; })||{}).name : '未紐付け';
  toast('✅', store + ' → ' + (corpName||'未紐付け') + ' に設定しました');
  await loadAll();
  renderDashboard();
}

// リアルタイム
function startRealtime() {
  db.channel('admin-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'inventory'}, loadAll)
    .on('postgres_changes',{event:'*',schema:'public',table:'corporations'}, loadAll)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'stock_history'}, loadAll)
    .subscribe(function(status){
      document.getElementById('sync-status').textContent = status==='SUBSCRIBED'?'リアルタイム監視中':'接続中...';
    });
}

function toast(icon, msg) {
  var el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = '<span>' + icon + '</span><span>' + msg + '</span>';
  document.getElementById('toasts').appendChild(el);
  setTimeout(function(){ el.remove(); }, 3000);
}
</script>
